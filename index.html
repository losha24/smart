<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>כסף חכם - 1.4.0</title>
<link rel="stylesheet" href="style.css">
<link rel="manifest" href="manifest.json">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<header>כסף חכם</header>
<div class="logo-container"><img src="icon-192.png" alt="לוגו"></div>

<nav>
    <button onclick="showSection('dashboard')">📊 מצב אישי</button>
    <button onclick="showSection('income_section')">💰 תקציב</button>
    <button onclick="showSection('loan_section')">💳 הלוואה</button>
    <button onclick="showSection('mortgage_section')">🏠 משכנתא</button>
    <button onclick="exportData()" class="orange">📥 גיבוי</button>
    <button onclick="importData()" class="orange">📤 שחזור</button>
    <button onclick="showAdmin()" class="blue">⚙️ ניהול</button>
    <button onclick="toggleDark()" class="red">🌙 לילה</button>
    <button onclick="resetAll()" class="gray">🧹 איפוס</button>
</nav>

<input type="file" id="fileInput" style="display:none" onchange="handleFile(this)">

<div id="dashboard" class="section active">
    <div class="card">
        <h3>סיכום תקציב חודשי</h3>
        <div class="dash-container">
            <div id="dash_stats" style="font-size: 18px; font-weight: bold; line-height: 2.2;"></div>
            <div class="chart-box"><canvas id="budgetChart"></canvas></div>
        </div>
    </div>
</div>

<div id="income_section" class="section">
    <div class="card">
        <h3>ניהול תקציב</h3>
        <div class="grid">
            <div>
                <label>הכנסות</label>
                <div style="display:flex; gap:5px;">
                    <input type="text" id="inc_name" placeholder="מקור">
                    <input type="number" id="inc_val" placeholder="₪">
                    <button onclick="addItem('incomes')">➕</button>
                </div>
                <div id="inc_table"></div>
            </div>
            <div>
                <label>הוצאות</label>
                <div style="display:flex; gap:5px;">
                    <input type="text" id="exp_name" placeholder="שם">
                    <input type="number" id="exp_val" placeholder="₪">
                    <button onclick="addItem('expenses')">➕</button>
                </div>
                <div id="exp_table"></div>
            </div>
        </div>
    </div>
</div>

<div id="loan_section" class="section">
    <div class="card">
        <h3>מחשבון הלוואה חכם</h3>
        <div class="grid">
            <input type="number" id="l_amt" placeholder="סכום הלוואה" oninput="calcLoan();">
            <input type="number" id="l_rt" placeholder="ריבית %" oninput="calcLoan();">
            <input type="number" id="l_yrs" placeholder="תקופה בשנים" oninput="calcLoan();">
            <input type="number" id="l_extra" placeholder="תוספת חודשית ₪" oninput="calcLoan();" style="border: 2px solid #8e24aa;">
        </div>
        <div id="l_info" class="extra-info"></div>
        <div id="l_res" style="font-size: 20px; color: #d32f2f; margin: 15px 0; font-weight: bold;"></div>
        <div id="l_tbl_area"></div>
    </div>
</div>

<div id="mortgage_section" class="section">
    <div class="card">
        <h3>מחשבון משכנתא</h3>
        <div id="m_tracks">
            <div class="card"><h4>מסלול 1</h4><div class="grid">
                <input type="number" id="m_a1" placeholder="סכום" oninput="calcM();">
                <input type="number" id="m_r1" placeholder="%" oninput="calcM();">
                <input type="number" id="m_y1" placeholder="שנים" oninput="calcM();">
                <input type="number" id="m_e1" placeholder="תוספת ₪" oninput="calcM();">
            </div><div id="m_info1" class="extra-info"></div></div>
            <div class="card"><h4>מסלול 2</h4><div class="grid">
                <input type="number" id="m_a2" placeholder="סכום" oninput="calcM();">
                <input type="number" id="m_r2" placeholder="%" oninput="calcM();">
                <input type="number" id="m_y2" placeholder="שנים" oninput="calcM();">
                <input type="number" id="m_e2" placeholder="תוספת ₪" oninput="calcM();">
            </div><div id="m_info2" class="extra-info"></div></div>
            <div class="card"><h4>מסלול 3</h4><div class="grid">
                <input type="number" id="m_a3" placeholder="סכום" oninput="calcM();">
                <input type="number" id="m_r3" placeholder="%" oninput="calcM();">
                <input type="number" id="m_y3" placeholder="שנים" oninput="calcM();">
                <input type="number" id="m_e3" placeholder="תוספת ₪" oninput="calcM();">
            </div><div id="m_info3" class="extra-info"></div></div>
        </div>
        <div id="m_res_summary" style="font-size: 18px; font-weight: bold; background: #e8f5e9; padding: 15px; border-radius: 10px;"></div>
        <div id="m_tbl_area"></div>
    </div>
</div>

<footer>&copy; 2026 Alexsei Zavodisker | כסף חכם v1.4.0</footer>

<script src="storage.js"></script>
<script src="app.js"></script>
<script src="loan.js"></script>
<script src="mortgage.js"></script>
<script src="admin.js"></script>
<script src="update.js"></script>
<script src="service-worker.js"></script>
</body>
</html>
