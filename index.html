<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Smart Money Pro | v6.1.2</title>
    
    <link rel="manifest" href="manifest.json?v=6.1.2">
    <meta name="theme-color" content="#0f172a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="logo.png">
    
    <link rel="stylesheet" href="style.css?v=6.1.2">
    <style>
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 9999; justify-content: center; align-items: center; }
        .modal-card { width: 85%; max-width: 320px; text-align: center; padding: 25px; background: #1e293b; border-radius: 15px; border: 1px solid var(--blue); }
        
        .admin-box {
            background: rgba(59, 130, 246, 0.15);
            border-right: 4px solid var(--blue);
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 15px;
            font-size: 14px;
            color: #fff;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }
    </style>
</head>
<body class="dark-theme">
    
    <header class="main-header">
        <img src="logo.png" alt="Smart Money Pro" class="header-logo-big" onclick="openTab('home')" style="cursor:pointer;">
    </header>

    <div class="stats-bar-top">
        <div class="stat-item">💰 <span id="money">0</span>₪</div>
        <div class="stat-item">🏦 <span id="bank">0</span>₪</div>
        <div class="stat-item">⭐ רמה <span id="life-level-ui">1</span></div>
    </div>

    <div id="status-bar" class="status-msg"></div>

    <nav class="topbar">
        <div class="nav-row">
            <button onclick="openTab('home')" id="btnHome" class="active">🏠 בית</button>
            <button onclick="openTab('work')" id="btnWork">⚒️ עבודות</button>
            <button onclick="openTab('tasks')" id="btnTasks">🎰 קזינו</button>
        </div>
        <div class="nav-row">
            <button onclick="openTab('invest')" id="btnInvest">📈 בורסה</button>
            <button onclick="openTab('business')" id="btnBusiness">🏢 עסקים</button>
            <button onclick="openTab('estate')" id="btnEstate">🏠 נדל"ן</button>
        </div>
        <div class="nav-row">
            <button onclick="openTab('skills')" id="btnSkills">🎓 כישורים</button>
            <button onclick="openTab('bank')" id="btnBank">🏦 בנק</button>
            <button onclick="openTab('cars')" id="btnCars">🚗 רכבים</button>
        </div>
        <div class="nav-row">
            <button onclick="openTab('market')" id="btnMarket">🛒 שוק</button>
            <button onclick="document.getElementById('installModal').style.display='flex'" class="sys-btn">📲</button>
            <button onclick="forceUpdate()" class="sys-btn">🔄</button>
            <button onclick="toggleTheme()" class="sys-btn">🌓</button>
        </div>
    </nav>

    <main id="content" class="fade-in container"></main>

    <div id="installModal" class="modal-overlay" onclick="closeInstallGuide()">
        <div class="modal-card" onclick="event.stopPropagation()">
            <h3>📲 התקנה</h3>
            <p id="android-instr">לחץ על 3 הנקודות בתפריט ובחר "התקן אפליקציה".</p>
            <p id="ios-instr" style="display:none;">לחץ על "שתף" ואז "הוסף למסך הבית".</p>
            <button class="action" onclick="closeInstallGuide()" style="background:var(--red); color:#fff; width:100%;">סגור</button>
        </div>
    </div>

    <footer class="main-footer">
        © 2026 Smart Money Pro v6.1.2 | אלכסיי זבודיסקר
    </footer>

    <script src="js/core.js?v=6.1.2"></script>
    <script src="js/activities.js?v=6.1.2"></script>
    <script src="js/economy.js?v=6.1.2"></script>
    <script src="js/ui.js?v=6.1.2"></script>

    <script>
        const adminMsgText = "המערכת מעודכנת לגרסה 6.1.2. כל המערכות פעילות!";

        // רישום Service Worker לאופליין וביצועים
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js?v=6.1.2')
                    .then(reg => console.log('SW Registered!', reg.scope))
                    .catch(err => console.log('SW Registration Failed:', err));
            });
        }

        function showStatus(msg, type = 'blue') {
            const bar = document.getElementById('status-bar');
            if (!bar) return;
            const colors = { 'green': '#22c55e', 'red': '#ef4444', 'blue': '#3b82f6' };
            bar.innerText = msg;
            bar.style.backgroundColor = colors[type] || colors.blue;
            bar.style.opacity = "1";
            setTimeout(() => { bar.style.opacity = "0"; }, 3000);
        }

        function openTab(tabName) {
            const content = document.getElementById('content');
            if (!content) return;

            // עדכון ויזואלי של הכפתור הפעיל
            document.querySelectorAll('.topbar button').forEach(btn => btn.classList.remove('active'));
            const btnId = 'btn' + tabName.charAt(0).toUpperCase() + tabName.slice(1);
            if (document.getElementById(btnId)) document.getElementById(btnId).classList.add('active');

            content.innerHTML = ""; 
            
            try {
                if (tabName === 'home') {
                    if (typeof drawHome === 'function') drawHome(content);
                    const adminDiv = document.createElement('div');
                    adminDiv.className = 'admin-box fade-in';
                    adminDiv.innerHTML = `📢 <b>הודעת מערכת:</b><br>${adminMsgText}`;
                    content.prepend(adminDiv);
                } 
                else if (tabName === 'work') drawWork(content);
                else if (tabName === 'invest') drawInvest(content);
                else if (tabName === 'business') drawBusiness(content);
                else if (tabName === 'tasks') drawTasks(content);
                else if (tabName === 'estate') drawEstate(content);
                else if (tabName === 'skills') drawSkills(content);
                else if (tabName === 'bank') drawBank(content);
                else if (tabName === 'cars') drawCars(content);
                else if (tabName === 'market') drawMarket(content);
            } catch (err) {
                console.error("Tab Load Error:", err);
                content.innerHTML = `<div class="card">⚠️ שגיאה בטעינת הרכיב. נסה לרענן.</div>`;
            }
            
            if (typeof updateUI === 'function') updateUI();
        }

        function toggleTheme() {
            document.body.classList.toggle('light-theme');
            const isLight = document.body.classList.contains('light-theme');
            localStorage.setItem('theme', isLight ? 'light' : 'dark');
        }

        // פונקציית עדכון מאולץ - מנקה קאש ומרעננת
        async function forceUpdate() {
            if ('caches' in window) {
                const names = await caches.keys();
                await Promise.all(names.map(name => caches.delete(name)));
            }
            window.location.reload(true);
        }

        function closeInstallGuide() { document.getElementById('installModal').style.display = 'none'; }

        document.addEventListener('DOMContentLoaded', () => {
            // טעינת הגדרת נושא
            if(localStorage.getItem('theme') === 'light') document.body.classList.add('light-theme');
            
            // פתיחת טאב בית בברירת מחדל
            openTab('home');

            // זיהוי מכשיר להוראות התקנה
            if (/iPhone|iPad|iPod/i.test(navigator.userAgent)) {
                document.getElementById('android-instr').style.display = 'none';
                document.getElementById('ios-instr').style.display = 'block';
            }
        });
    </script>
</body>
</html>
