<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Smart Money Pro | v6.1.9</title>
    
    <link rel="manifest" href="manifest.json?v=6.1.9">
    <meta name="theme-color" content="#0f172a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="logo.png">
    
    <link rel="stylesheet" href="style.css?v=6.1.9">
    <style>
        /* תיקון מרכוז למודאל ההתקנה */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            z-index: 9999;
            justify-content: center; /* מרכוז אופקי */
            align-items: center;    /* מרכוז אנכי */
        }
        .modal-card {
            width: 90%;
            max-width: 320px;
            text-align: center; /* מרכוז טקסט פנימי */
            padding: 25px;
        }
    </style>
</head>
<body class="dark-theme">
    
    <header class="main-header">
        <img src="logo.png" alt="Smart Money Pro" class="header-logo-big" onclick="openTab('home')" style="cursor:pointer;">
    </header>

    <div class="stats-bar-top">
        <div class="stat-item">💰 <span id="money">0</span>₪</div>
        <div class="stat-item">🏦 <span id="bank">0</span>₪</div>
        <div class="stat-item">⭐ רמה <span id="life-level-ui">1</span></div>
    </div>

    <div id="status-bar" class="status-msg"></div>

    <nav class="topbar">
        <div class="nav-row">
            <button onclick="openTab('home')" id="btnHome" class="active">🏠 בית</button>
            <button onclick="openTab('work')" id="btnWork">⚒️ עבודות</button>
            <button onclick="openTab('tasks')" id="btnTasks">🎰 קזינו</button>
        </div>
        <div class="nav-row">
            <button onclick="openTab('invest')" id="btnInvest">📈 בורסה</button>
            <button onclick="openTab('business')" id="btnBusiness">🏢 עסקים</button>
            <button onclick="openTab('estate')" id="btnEstate">🏠 נדל"ן</button>
        </div>
        <div class="nav-row">
            <button onclick="openTab('skills')" id="btnSkills">🎓 כישורים</button>
            <button onclick="openTab('bank')" id="btnBank">🏦 בנק</button>
            <button onclick="openTab('cars')" id="btnCars">🚗 רכבים</button>
        </div>
        <div class="nav-row">
            <button onclick="openTab('market')" id="btnMarket">🛒 שוק</button>
            <button onclick="forceUpdate()" class="sys-btn">🔄 עדכון</button>
            <button onclick="toggleTheme()" class="sys-btn">🌓 מצב</button>
        </div>
    </nav>

    <main id="content" class="fade-in container"></main>

    <div id="installModal" class="modal-overlay" onclick="closeInstallGuide()">
        <div class="modal-card" onclick="event.stopPropagation()">
            <div style="font-size: 3rem; margin-bottom: 10px;">📲</div>
            <h3 style="margin-bottom: 15px;">התקנת האפליקציה</h3>
            <div id="android-instr">
                <p>לחץ על <b>3 הנקודות</b> בדפדפן<br>ובחר ב-<b>"התקן אפליקציה"</b>.</p>
            </div>
            <div id="ios-instr" style="display:none;">
                <p>לחץ על כפתור ה-<b>שתף</b><br>ואז על <b>"הוסף למסך הבית"</b>.</p>
            </div>
            <button class="action" onclick="closeInstallGuide()" style="background:var(--red); margin-top:20px; color:#fff; width: 100%;">סגור</button>
        </div>
    </div>

    <footer class="main-footer">
        © 2026 Smart Money Pro v6.1.9 | אלכסיי זבודיסקר
    </footer>

    <script src="js/core.js?v=6.1.9"></script>
    <script src="js/activities.js?v=6.1.9"></script>
    <script src="js/economy.js?v=6.1.9"></script>
    <script src="js/ui.js?v=6.1.9"></script>

    <script>
        const adminMessage = "ברוכים הבאים לגרסה 6.1.9! הוספנו מנגנון מתנה יומית וכפתור איפוס משחק במרכז השליטה.";

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js?v=6.1.9');
            });
        }

        // --- פונקציית מתנה יומית ---
        function claimDailyGift() {
            const now = Date.now();
            const lastGift = localStorage.getItem('lastDailyGift') || 0;
            const cooldown = 24 * 60 * 60 * 1000; // 24 שעות

            if (now - lastGift < cooldown) {
                const hoursLeft = Math.ceil((cooldown - (now - lastGift)) / (1000 * 60 * 60));
                showStatus(`🎁 כבר לקחת מתנה! חזור בעוד ${hoursLeft} שעות.`, 'yellow');
                return;
            }

            const amount = Math.floor(Math.random() * 1000) + 500;
            money += amount;
            localStorage.setItem('lastDailyGift', now);
            saveGame();
            updateUI();
            showStatus(`🎁 קיבלת מתנה יומית בסך ${amount}₪!`, 'green');
        }

        // --- פונקציית איפוס משחק ---
        function resetGameWithConfirm() {
            if (confirm("⚠️ האם אתה בטוח שברצונך לאפס את כל המשחק? כל הכסף והנכסים יימחקו!")) {
                localStorage.clear();
                location.reload();
            }
        }

        function openTab(tabName) {
            const content = document.getElementById('content');
            document.querySelectorAll('.topbar button').forEach(btn => btn.classList.remove('active'));
            const btnId = 'btn' + tabName.charAt(0).toUpperCase() + tabName.slice(1);
            if(document.getElementById(btnId)) document.getElementById(btnId).classList.add('active');

            content.innerHTML = ""; 

            if(tabName === 'home') {
                content.innerHTML = `
                    <div class="card fade-in" style="border-right: 4px solid var(--purple);">
                        <h3 style="margin-top:0; color:var(--purple); font-size: 16px;">📢 הודעת מנהל</h3>
                        <p style="font-size: 14px;">${adminMessage}</p>
                    </div>

                    <div class="grid-2 fade-in">
                        <div class="card" style="border: 1px solid var(--yellow); cursor: pointer; text-align:center;" onclick="claimDailyGift()">
                            <div style="font-size: 1.5rem;">🎁</div>
                            <div style="font-size: 12px; font-weight: bold; margin-top: 5px;">מתנה יומית</div>
                        </div>

                        <div class="card" style="border: 1px solid var(--blue); background: rgba(56, 189, 248, 0.05); cursor: pointer; text-align:center;" onclick="document.getElementById('installModal').style.display='flex'">
                            <div style="font-size: 1.5rem;">📲</div>
                            <div style="font-size: 12px; font-weight: bold; margin-top: 5px; color: var(--blue);">התקנת אפליקציה</div>
                        </div>
                    </div>

                    <div class="card fade-in" style="border: 1px solid var(--red); text-align:center; padding: 10px; cursor: pointer;" onclick="resetGameWithConfirm()">
                        <div style="color: var(--red); font-weight: bold; font-size: 13px;">⚠️ איפוס משחק</div>
                    </div>
                `;
                if(typeof updateUI === 'function') updateUI();
            } 
            else if(tabName === 'work') drawWork(content);
            else if(tabName === 'invest') drawMarket(content);
            else if(tabName === 'business') drawBusiness(content);
            else if(tabName === 'tasks') drawTasks(content);
            else if(tabName === 'estate') drawEstate(content);
            else if(tabName === 'skills') drawSkills(content);
            else if(tabName === 'bank') drawBank(content);
            else if(tabName === 'cars') drawCars(content);
            else if(tabName === 'market') drawMarket(content);
        }

        function closeInstallGuide() {
            document.getElementById('installModal').style.display = 'none';
        }

        document.addEventListener('DOMContentLoaded', () => {
            openTab('home');
        });
    </script>
</body>
</html>
