<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Smart Money Pro | v6.0.1</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0f172a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <link rel="apple-touch-icon" href="logo.png">
    <link rel="stylesheet" href="style.css">
</head>
<body class="dark-theme" id="app-body">
    
    <header class="main-header">
        <div class="header-center">
            <img src="logo.png" alt="Logo" class="header-logo-big" onclick="toggleTheme()" style="cursor:pointer;">
        </div>
    </header>

    <div class="stats-bar-top">
        <div class="stat-item">💰 <span id="money">0</span>₪</div>
        <div class="stat-item">🏦 <span id="bank">0</span>₪</div>
        <div class="stat-item">⭐ רמה <span id="life-level-ui">1</span></div>
    </div>

    <div id="status-bar" class="status-msg">מוכן לפעולה</div>

    <nav class="topbar">
        <div class="nav-row">
            <button onclick="openTab('home')" id="btnHome" class="active">🏠 בית</button>
            <button onclick="openTab('work')" id="btnWork">⚒️ עבודות</button>
            <button onclick="openTab('tasks')" id="btnTasks">🎰 קזינו</button>
        </div>
        <div class="nav-row">
            <button onclick="openTab('invest')" id="btnInvest">📈 בורסה</button>
            <button onclick="openTab('business')" id="btnBusiness">🏢 עסקים</button>
            <button onclick="openTab('realestate')" id="btnRealestate">🏠 נדל"ן</button>
        </div>
        <div class="nav-row">
            <button onclick="openTab('skills')" id="btnSkills">🎓 כישורים</button>
            <button onclick="openTab('bank')" id="btnBank">🏦 בנק</button>
            <button onclick="openTab('cars')" id="btnCars">🚗 רכבים</button>
        </div>
        <div class="nav-row">
            <button onclick="openTab('market')" id="btnMarket">🛒 שוק</button>
            <button onclick="forceUpdate()" class="sys-btn" title="רענון גרסה">🔄</button>
            <button onclick="toggleTheme()" class="sys-btn" title="מצב יום/לילה">🌓</button>
        </div>
    </nav>

    <main id="content" class="fade-in container"></main>

    <div id="installModal" class="modal-overlay" style="display:none;" onclick="closeInstallGuide()">
        <div class="modal-card" onclick="event.stopPropagation()">
            <h3>📲 התקנת האפליקציה</h3>
            <div id="android-instr" class="instr">
                <p>לחץ על כפתור התפריט בדפדפן (3 נקודות) ובחר ב-<b>"התקן אפליקציה"</b>.</p>
            </div>
            <div id="ios-instr" class="instr" style="display:none;">
                <p>1. לחץ על כפתור <b>השיתוף</b> בתחתית הדפדפן.</p>
                <p>2. בחר ב-<b>"הוסף למסך הבית"</b> (➕).</p>
            </div>
            <button class="action" onclick="closeInstallGuide()" style="margin-top:15px; background:var(--red);">סגור</button>
        </div>
    </div>

    <footer class="main-footer" style="text-align:center; padding:20px; font-size:10px; opacity:0.5;">
        © 2026 Smart Money Pro v6.0.1 | Alexey Zavodisker
    </footer>

    <script src="js/core.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/economy.js"></script>
    <script src="js/activities.js"></script>

    <script>
        // אתחול האפליקציה ורישום ה-Service Worker
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js')
            .then(() => console.log("v6.0.1 SW Registered"))
            .catch(err => console.error("SW Registration Failed:", err));
        }

        // טעינת דף הבית בסטארט-אפ
        document.addEventListener("DOMContentLoaded", () => {
            setTimeout(() => {
                if(typeof openTab === 'function') openTab('home');
            }, 150);
        });
    </script>
</body>
</html>
