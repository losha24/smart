<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0f172a">
    <title>Smart Money AI v4.5.0</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
</head>
<body class="dark-theme">

<header class="main-header">
    <button id="theme-toggle" onclick="toggleTheme()">🌓</button>
    <img src="logo.png" alt="Smart Money AI" class="app-logo">
    <div style="width: 40px;"></div>
</header>

<div id="status-bar"><span id="msg-text"></span></div>

<div class="stats-bar-top">
    <div>💵 <span id="money">0</span></div>
    <div>🏦 <span id="bank">0</span></div>
    <div>📈 <span id="passive-ui">0</span>/s</div>
</div>

<nav class="topbar">
    <div class="nav-row">
        <button onclick="openTab('home')" id="btnHome">🏠 בית</button>
        <button onclick="openTab('work')" id="btnWork">💼 עבודה</button>
        <button onclick="openTab('tasks')" id="btnTasks">🎯 משימות</button>
    </div>
    <div class="nav-row">
        <button onclick="openTab('business')" id="btnBusiness">🏢 עסקים</button>
        <button onclick="openTab('realestate')" id="btnRealestate">🏘️ נדל"ן</button>
        <button onclick="openTab('invest')" id="btnInvest">📊 השקעות</button>
    </div>
    <div class="nav-row">
        <button onclick="openTab('skills')" id="btnSkills">🎓 כישורים</button>
        <button onclick="openTab('market')" id="btnMarket">🛒 שוק</button>
        <button onclick="openTab('bank')" id="btnBank">🏦 בנק</button>
    </div>
    <div class="nav-row">
        <button onclick="openTab('install')" id="btnInstall">📲 התקנה</button>
        <button onclick="location.reload()" style="background:var(--blue); color:white;">🔄 עדכון</button>
        <button onclick="resetGame()" id="btnReset" style="background:#450a0a">🧹 איפוס</button>
    </div>
</nav>

<div id="content" class="fade-in"></div>

<footer class="main-footer">© 2026 Alexey Zavodisker | Smart Money AI v4.5.0</footer>

<script src="game.js"></script>
</body>
</html>
