<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Smart Money AI 3.1.6</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
</head>
<body>
    <img src="logo.png" class="logo">
    <div class="stats-container">
        <div class="stat-card">💵 כסף: <span id="money">0</span></div>
        <div class="stat-card">💹 מניות: <span id="stocksCount">0</span></div>
        <div class="stat-card">⭐ רמה: <span id="level">1</span></div>
        <div class="stat-card">🏦 בנק: <span id="bank">0</span></div>
    </div>
    <div class="xp-container">
        <div class="xpbar"><div id="xpfill"></div></div>
    </div>
    <nav class="topbar">
        <div class="nav-row">
            <button onclick="openTab('home')" id="btnHome">🏠 בית</button>
            <button onclick="openTab('work')" id="btnWork">💼 עבודה</button>
            <button onclick="openTab('stock')" id="btnStock">💹 בורסה</button>
        </div>
        <div class="nav-row">
            <button onclick="openTab('install')" id="btnInstall">📲 התקנה</button>
            <button onclick="checkUpdate()" id="btnUpdate">🔄 עדכון</button>
            <button onclick="resetGame()" style="background:#450a0a">🧹 איפוס</button>
        </div>
    </nav>
    <div id="message-box"><div id="message">טוען...</div></div>
    <div id="content"></div>
    <script src="game.js"></script>
</body>
</html>
