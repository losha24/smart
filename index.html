<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Smart Money Pro</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
</head>
<body class="dark-theme" id="app-body">
    <header class="main-header">
        <div class="header-top">
            <button onclick="toggleTheme()" class="icon-btn">☀️/🌙</button>
            <img src="logo.png" alt="Smart Money" class="header-logo">
            <div class="header-actions">
                <button onclick="forceUpdate()" class="update-btn" title="עדכון גרסה">🔄</button>
                <button onclick="resetGame()" class="reset-btn">R</button>
            </div>
        </div>
    </header>

    <div class="stats-bar-top">
        <div class="stat-item">💰 <span id="money">0</span>₪</div>
        <div class="stat-item">🏦 <span id="bank">0</span>₪</div>
        <div class="stat-item">📈 <span id="passive-ui">0</span>/s</div>
    </div>
    <div id="status-bar" class="status-msg">מערכת מוכנה</div>

    <nav class="topbar">
        <div class="nav-row">
            <button onclick="openTab('home')" id="btnHome" class="active">🏠 בית</button>
            <button onclick="openTab('work')" id="btnWork">⚒️ עבודה</button>
            <button onclick="openTab('tasks')" id="btnTasks">🎯 משימות</button>
            <button onclick="openTab('invest')" id="btnInvest">📈 בורסה</button>
        </div>
        <div class="nav-row">
            <button onclick="openTab('business')" id="btnBusiness">🏢 עסקים</button>
            <button onclick="openTab('realestate')" id="btnRealestate">🏠 נדל"ן</button>
            <button onclick="openTab('skills')" id="btnSkills">🎓 כישורים</button>
            <button onclick="openTab('bank')" id="btnBank">🏦 בנק</button>
        </div>
        <div class="nav-row">
            <button onclick="openTab('cars')" id="btnCars">🚗 רכבים</button>
            <button onclick="openTab('market')" id="btnMarket">🛒 שוק</button>
        </div>
    </nav>

    <main id="content" class="fade-in"></main>

    <footer class="main-footer">
        © 2026 Alexey Zavodisker | Smart Money v5.4.0
    </footer>

    <script src="js/core.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/economy.js"></script>
    <script src="js/activities.js"></script>
</body>
</html>
