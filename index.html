<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartMoney | Professional Calculators</title>
    <style>
        :root {
            --bg: #f8fafc;
            --panel: #ffffff;
            --primary: #1e293b;
            --accent: #22c55e;
            --border: #e2e8f0;
        }

        body { 
            margin: 0; font-family: system-ui, -apple-system, sans-serif; 
            background: var(--bg); color: var(--primary); padding-bottom: 50px;
        }

        header { 
            background: var(--primary); color: white; padding: 20px; 
            text-align: center; position: sticky; top: 0; z-index: 10;
        }

        .container { max-width: 600px; margin: auto; padding: 15px; }

        /* Calculator Card */
        .calc-card {
            background: var(--panel); border: 1px solid var(--border);
            border-radius: 12px; padding: 20px; margin-bottom: 20px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
        }

        .calc-title { 
            font-weight: bold; border-bottom: 2px solid var(--accent);
            display: inline-block; margin-bottom: 15px; 
        }

        .input-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 15px; }

        .field { display: flex; flex-direction: column; gap: 5px; }
        label { font-size: 0.85rem; color: #64748b; }
        input { 
            padding: 10px; border: 1px solid var(--border); 
            border-radius: 6px; font-size: 1rem; outline: none;
        }

        .results-panel {
            background: #f1f5f9; padding: 15px; border-radius: 8px;
            margin-top: 15px; border-right: 4px solid var(--accent);
        }

        .res-item { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 0.95rem; }
        .res-item b { color: var(--accent); }

        .refresh-btn {
            width: 100%; background: var(--primary); color: white;
            border: none; padding: 12px; border-radius: 8px;
            font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px;
        }
        
        .spinning { animation: spin 0.6s linear; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <header>
        <h2 style="margin:0;">מחשבונים ונתונים פיננסיים</h2>
    </header>

    <div class="container">

        <div class="calc-card">
            <span class="calc-title">🏠 מחשבון משכנתא ופירעון מוקדם</span>
            <div class="input-grid">
                <div class="field">
                    <label>יתרת חוב (₪)</label>
                    <input type="number" id="m_loan" value="1000000">
                </div>
                <div class="field">
                    <label>ריבית שנתית (%)</label>
                    <input type="number" id="m_rate" value="5" step="0.1">
                </div>
                <div class="field">
                    <label>תקופה (שנים)</label>
                    <input type="number" id="m_years" value="20">
                </div>
                <div class="field">
                    <label>סכום פירעון (₪)</label>
                    <input type="number" id="m_prepay" value="50000">
                </div>
            </div>
            <button class="refresh-btn" onclick="calcMortgage(this)">
                <span class="icon">🔄</span> חשב נתונים
            </button>
            <div class="results-panel" id="res_mortgage">
                <div class="res-item">החזר חודשי: <b id="m_monthly">₪ 0</b></div>
                <div class="res-item">חיסכון מפירעון: <b id="m_save">₪ 0</b></div>
            </div>
        </div>

        <div class="calc-card">
            <span class="calc-title">📈 סימולטור צמיחת הון</span>
            <div class="input-grid">
                <div class="field">
                    <label>הפקדה חד פעמית (₪)</label>
                    <input type="number" id="i_start" value="10000">
                </div>
                <div class="field">
                    <label>הפקדה חודשית (₪)</label>
                    <input type="number" id="i_month" value="1000">
                </div>
                <div class="field">
                    <label>תשואה צפויה (%)</label>
                    <input type="number" id="i_rate" value="7">
                </div>
                <div class="field">
                    <label>זמן (שנים)</label>
                    <input type="number" id="i_years" value="10">
                </div>
            </div>
            <button class="refresh-btn" onclick="calcInvest(this)">
                <span class="icon">🔄</span> חשב צפי צמיחה
            </button>
            <div class="results-panel" id="res_invest">
                <div class="res-item">הון מצטבר: <b id="i_total">₪ 0</b></div>
                <div class="res-item">מתוכם רווח: <b id="i_profit">₪ 0</b></div>
            </div>
        </div>

        <div class="calc-card">
            <span class="calc-title">📉 מחשבון שחיקת כסף (אינפלציה)</span>
            <div class="input-grid">
                <div class="field">
                    <label>סכום נוכחי (₪)</label>
                    <input type="number" id="inf_amt" value="100000">
                </div>
                <div class="field">
                    <label>צפי מדד שנתי (%)</label>
                    <input type="number" id="inf_rate" value="3">
                </div>
            </div>
            <button class="refresh-btn" onclick="calcInf(this)">
                <span class="icon">🔄</span> חשב שחיקה
            </button>
            <div class="results-panel">
                <div class="res-item">ערך ריאלי בעוד 5 שנים: <b id="inf_res">₪ 0</b></div>
            </div>
        </div>

    </div>

    <script>
        function calcMortgage(btn) {
            animateIcon(btn);
            const P = parseFloat(document.getElementById('m_loan').value);
            const r = parseFloat(document.getElementById('m_rate').value) / 100 / 12;
            const n = parseFloat(document.getElementById('m_years').value) * 12;
            const prepay = parseFloat(document.getElementById('m_prepay').value);

            const monthly = (P * r * Math.pow(1 + r, n)) / (Math.pow(1 + r, n) - 1);
            const totalInterestOrig = (monthly * n) - P;
            
            // חיסכון מוערך מפירעון (פישוט)
            const savedInterest = prepay * (Math.pow(1 + (r*12), parseFloat(document.getElementById('m_years').value)) - 1);

            document.getElementById('m_monthly').innerText = "₪ " + Math.round(monthly).toLocaleString();
            document.getElementById('m_save').innerText = "₪ " + Math.round(savedInterest).toLocaleString();
        }

        function calcInvest(btn) {
            animateIcon(btn);
            const start = parseFloat(document.getElementById('i_start').value);
            const monthly = parseFloat(document.getElementById('i_month').value);
            const r = parseFloat(document.getElementById('i_rate').value) / 100 / 12;
            const n = parseFloat(document.getElementById('i_years').value) * 12;

            const total = start * Math.pow(1 + r, n) + monthly * ((Math.pow(1 + r, n) - 1) / r);
            const invested = start + (monthly * n);

            document.getElementById('i_total').innerText = "₪ " + Math.round(total).toLocaleString();
            document.getElementById('i_profit').innerText = "₪ " + Math.round(total - invested).toLocaleString();
        }

        function calcInf(btn) {
            animateIcon(btn);
            const amt = parseFloat(document.getElementById('inf_amt').value);
            const rate = parseFloat(document.getElementById('inf_rate').value) / 100;
            const res = amt / Math.pow(1 + rate, 5);
            document.getElementById('inf_res').innerText = "₪ " + Math.round(res).toLocaleString();
        }

        function animateIcon(btn) {
            const icon = btn.querySelector('.icon');
            icon.classList.add('spinning');
            setTimeout(() => icon.classList.remove('spinning'), 600);
        }
    </script>

</body>
</html>
