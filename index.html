<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Smart Money Pro | v6.0.6</title>
    
    <link rel="manifest" href="manifest.json?v=6.0.6">
    <meta name="theme-color" content="#0f172a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="logo.png">
    
    <link rel="stylesheet" href="style.css?v=6.0.6">
    <style>
        /* מרכוז חלון ההתקנה */
        .modal-overlay {
            display: none; 
            position: fixed; 
            top: 0; left: 0; 
            width: 100%; height: 100%; 
            background: rgba(0,0,0,0.85); 
            z-index: 9999; 
            justify-content: center; 
            align-items: center;
        }
        .modal-card {
            width: 85%;
            max-width: 320px;
            text-align: center;
            padding: 25px;
            background: #1e293b;
            border-radius: 15px;
            border: 1px solid var(--blue);
        }
    </style>
</head>
<body class="dark-theme">
    
    <header class="main-header">
        <img src="logo.png" alt="Smart Money Pro" class="header-logo-big" onclick="openTab('home')" style="cursor:pointer;">
    </header>

    <div class="stats-bar-top">
        <div class="stat-item">💰 <span id="money">0</span>₪</div>
        <div class="stat-item">🏦 <span id="bank">0</span>₪</div>
        <div class="stat-item">⭐ רמה <span id="life-level-ui">1</span></div>
    </div>

    <div id="status-bar" class="status-msg"></div>

    <nav class="topbar">
        <div class="nav-row">
            <button onclick="openTab('home')" id="btnHome" class="active">🏠 בית</button>
            <button onclick="openTab('work')" id="btnWork">⚒️ עבודות</button>
            <button onclick="openTab('tasks')" id="btnTasks">🎰 קזינו</button>
        </div>
        <div class="nav-row">
            <button onclick="openTab('invest')" id="btnInvest">📈 בורסה</button>
            <button onclick="openTab('business')" id="btnBusiness">🏢 עסקים</button>
            <button onclick="openTab('estate')" id="btnEstate">🏠 נדל"ן</button>
        </div>
        <div class="nav-row">
            <button onclick="openTab('skills')" id="btnSkills">🎓 כישורים</button>
            <button onclick="openTab('bank')" id="btnBank">🏦 בנק</button>
            <button onclick="openTab('cars')" id="btnCars">🚗 רכבים</button>
        </div>
        <div class="nav-row">
            <button onclick="openTab('market')" id="btnMarket">🛒 שוק</button>
            <button onclick="document.getElementById('installModal').style.display='flex'" class="sys-btn" title="התקנה">📲</button>
            <button onclick="forceUpdate()" class="sys-btn" title="עדכון">🔄</button>
            <button onclick="toggleTheme()" class="sys-btn" title="מצב">🌓</button>
        </div>
    </nav>

    <main id="content" class="fade-in container"></main>

    <div id="installModal" class="modal-overlay" onclick="closeInstallGuide()">
        <div class="modal-card" onclick="event.stopPropagation()">
            <div style="font-size: 2.5rem; margin-bottom: 10px;">📲</div>
            <h3>התקנת האפליקציה</h3>
            <div id="android-instr">
                <p>לחץ על 3 הנקודות בתפריט הדפדפן ובחר <b>"התקן אפליקציה"</b>.</p>
            </div>
            <div id="ios-instr" style="display:none;">
                <p>לחץ על <b>שתף</b> בתחתית המסך ואז על <b>"הוסף למסך הבית"</b>.</p>
            </div>
            <button class="action" onclick="closeInstallGuide()" style="background:var(--red); margin-top:15px; color:#fff; width: 100%;">סגור</button>
        </div>
    </div>

    <footer class="main-footer">
        © 2026 Smart Money Pro v6.0.6 | אלכסיי זבודיסקר
    </footer>

    <script src="js/core.js?v=6.0.6"></script>
    <script src="js/activities.js?v=6.0.6"></script>
    <script src="js/economy.js?v=6.0.6"></script>
    <script src="js/ui.js?v=6.0.6"></script>

    <script>
        // פונקציית פתיחת טאבים מוודאת שכל הפונקציות קיימות
        function openTab(tabName) {
            const content = document.getElementById('content');
            if (!content) return;

            document.querySelectorAll('.topbar button').forEach(btn => btn.classList.remove('active'));
            const activeBtn = document.getElementById('btn' + tabName.charAt(0).toUpperCase() + tabName.slice(1));
            if (activeBtn) activeBtn.classList.add('active');

            content.innerHTML = ""; 

            if (tabName === 'home') {
                if (typeof drawHome === 'function') drawHome(content);
                else {
                    content.innerHTML = `<div class="card"><h3>🏠 ברוך הבא, אלכסיי</h3><p>בחר פעילות מהתפריט למעלה כדי להתחיל.</p></div>`;
                }
            } 
            else if (tabName === 'work' && typeof drawWork === 'function') drawWork(content);
            else if (tabName === 'invest' && typeof drawInvest === 'function') drawInvest(content);
            else if (tabName === 'business' && typeof drawBusiness === 'function') drawBusiness(content);
            else if (tabName === 'tasks' && typeof drawTasks === 'function') drawTasks(content);
            else if (tabName === 'estate' && typeof drawEstate === 'function') drawEstate(content);
            else if (tabName === 'skills' && typeof drawSkills === 'function') drawSkills(content);
            else if (tabName === 'bank' && typeof drawBank === 'function') drawBank(content);
            else if (tabName === 'cars' && typeof drawCars === 'function') drawCars(content);
            else if (tabName === 'market' && typeof drawMarket === 'function') drawMarket(content);
            
            // עדכון UI כללי אחרי מעבר טאב
            if (typeof updateUI === 'function') updateUI();
        }

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js?v=6.0.6').then(reg => {
                    reg.update();
                });
            });
        }

        function closeInstallGuide() {
            document.getElementById('installModal').style.display = 'none';
        }

        // טעינה ראשונית של דף הבית
        document.addEventListener('DOMContentLoaded', () => {
            openTab('home');
            
            // זיהוי אוטומטי של iOS להצגת הוראות מתאימות
            if (/iPhone|iPad|iPod/i.test(navigator.userAgent)) {
                document.getElementById('android-instr').style.display = 'none';
                document.getElementById('ios-instr').style.display = 'block';
            }
        });
    </script>
</body>
</html>
