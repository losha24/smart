<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Smart Money Pro | v6.1.6</title>
    <link rel="stylesheet" href="style.css?v=6.1.6">
    <style>
        /* הגנה למקרה שה-CSS לא נטען */
        body { background: #0f172a; color: white; font-family: sans-serif; margin: 0; padding: 0; }
        .stats-bar-top { display: flex; justify-content: space-around; background: #1e293b; padding: 10px; border-bottom: 1px solid #334155; }
        .topbar { display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; padding: 10px; }
        .topbar button { padding: 10px; background: #334155; color: white; border: none; border-radius: 5px; cursor: pointer; }
        .active { background: #3b82f6 !important; }
        #msg { position: fixed; top: 10px; left: 50%; transform: translateX(-50%); z-index: 9999; background: #334155; padding: 10px; border-radius: 8px; pointer-events: none; opacity: 0; transition: 0.3s; }
    </style>
</head>
<body>

    <div class="stats-bar-top">
        <div>💰 <span id="money">0</span>₪</div>
        <div>🏦 <span id="bank">0</span>₪</div>
        <div>⭐ <span id="life-level-ui">1</span></div>
    </div>

    <div id="msg"></div>

    <nav class="topbar">
        <button onclick="openTab('home')" id="nav-home">🏠 בית</button>
        <button onclick="openTab('work')" id="nav-work">⚒️ עבודה</button>
        <button onclick="openTab('invest')" id="nav-invest">📈 בורסה</button>
        <button onclick="location.reload()">🔄 רענן</button>
    </nav>

    <main id="content" style="padding: 15px;"></main>

    <script src="js/core.js?v=1"></script>
    <script src="js/ui.js?v=1"></script>
    <script src="js/activities.js?v=1"></script>
    <script src="js/economy.js?v=1"></script>

    <script>
        // בדיקה אם הפונקציות נטענו
        window.onload = function() {
            console.log("דף נטען, בודק פונקציות...");
            
            if (typeof loadGame === 'function') {
                loadGame();
            } else {
                document.getElementById('content').innerHTML = "<b style='color:red;'>שגיאה: קובץ core.js לא נטען!</b>";
                return;
            }

            setTimeout(() => {
                openTab('home');
            }, 200);
        };

        function openTab(name) {
            const content = document.getElementById('content');
            
            // עדכון כפתור פעיל
            document.querySelectorAll('.topbar button').forEach(b => b.classList.remove('active'));
            const btn = document.getElementById('nav-' + name);
            if (btn) btn.classList.add('active');

            // ניקוי תוכן
            content.innerHTML = "טוען...";

            // בדיקה איזו פונקציה להפעיל
            try {
                if (name === 'home' && typeof drawHome === 'function') {
                    drawHome(content);
                } else if (name === 'work' && typeof drawWork === 'function') {
                    drawWork(content);
                } else if (name === 'invest' && typeof drawInvest === 'function') {
                    drawInvest(content);
                } else {
                    content.innerHTML = "הפונקציה של " + name + " לא נמצאה ב-JS.";
                }
                
                if (typeof updateUI === 'function') updateUI();
            } catch (e) {
                content.innerHTML = "<b style='color:red;'>שגיאה בהרצת הדף: " + e.message + "</b>";
            }
        }
    </script>
</body>
</html>
