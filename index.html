<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Smart Money Pro | v6.1.5</title>
    
    <link rel="manifest" href="manifest.json?v=6.1.5">
    <meta name="theme-color" content="#0f172a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="logo.png">
    
    <link rel="stylesheet" href="style.css?v=6.1.5">
</head>
<body class="dark-theme">
    
    <header class="main-header">
        <img src="logo.png" alt="Smart Money Pro" class="header-logo-big" onclick="openTab('home')" style="cursor:pointer;">
    </header>

    <div class="stats-bar-top">
        <div class="stat-item">💰 <span id="money">0</span>₪</div>
        <div class="stat-item">🏦 <span id="bank">0</span>₪</div>
        <div class="stat-item">⭐ רמה <span id="life-level-ui">1</span></div>
    </div>

    <div id="status-bar" class="status-msg" style="transition: all 0.3s ease; border: 1px solid transparent;"></div>

    <nav class="topbar">
        <div class="nav-row">
            <button onclick="openTab('home')" id="btnHome" class="active">🏠 בית</button>
            <button onclick="openTab('work')" id="btnWork">⚒️ עבודות</button>
            <button onclick="openTab('tasks')" id="btnTasks">🎰 קזינו</button>
        </div>
        <div class="nav-row">
            <button onclick="openTab('invest')" id="btnInvest">📈 בורסה</button>
            <button onclick="openTab('business')" id="btnBusiness">🏢 עסקים</button>
            <button onclick="openTab('estate')" id="btnEstate">🏠 נדל"ן</button>
        </div>
        <div class="nav-row">
            <button onclick="openTab('skills')" id="btnSkills">🎓 כישורים</button>
            <button onclick="openTab('bank')" id="btnBank">🏦 בנק</button>
            <button onclick="openTab('cars')" id="btnCars">🚗 רכבים</button>
        </div>
        <div class="nav-row">
            <button onclick="openTab('market')" id="btnMarket">🛒 שוק</button>
            <button onclick="forceUpdate()" class="sys-btn" title="רענון גרסה">🔄 עדכון</button>
            <button onclick="toggleTheme()" class="sys-btn" title="מצב יום/לילה">🌓 מצב</button>
        </div>
    </nav>

    <main id="content" class="fade-in container"></main>

    <div id="installModal" class="modal-overlay" style="display:none;" onclick="closeInstallGuide()">
        <div class="modal-card" onclick="event.stopPropagation()">
            <h3>📲 התקנת האפליקציה</h3>
            <div id="android-instr">
                <p>לחץ על 3 הנקודות בתפריט ובחר <b>"התקן אפליקציה"</b>.</p>
            </div>
            <div id="ios-instr" style="display:none;">
                <p>לחץ על <b>שתף</b> ואז על <b>"הוסף למסך הבית"</b>.</p>
            </div>
            <button class="action" onclick="closeInstallGuide()" style="background:var(--red); margin-top:15px; color:#fff;">סגור</button>
        </div>
    </div>

    <footer class="main-footer">
        © 2026 Smart Money Pro v6.1.5 | אלכסיי זבודיסקר
    </footer>

    <script src="js/core.js?v=6.1.5"></script>
    <script src="js/activities.js?v=6.1.5"></script>
    <script src="js/economy.js?v=6.1.5"></script>
    <script src="js/ui.js?v=6.1.5"></script>

    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js?v=6.1.5').then(reg => {
                    reg.update();
                }).catch(err => console.log('SW Reg Failed', err));
            });
        }

        // --- הוספת הפונקציה שחסרה לניהול הטאבים ---
        function openTab(tabName) {
            const content = document.getElementById('content');
            
            // עדכון כפתור פעיל בתפריט
            document.querySelectorAll('.topbar button').forEach(btn => btn.classList.remove('active'));
            const btnId = 'btn' + tabName.charAt(0).toUpperCase() + tabName.slice(1);
            if(document.getElementById(btnId)) document.getElementById(btnId).classList.add('active');

            content.innerHTML = "";

            if(tabName === 'home') {
                content.innerHTML = `
                    <div class="card fade-in">
                        <h3>🏠 מרכז שליטה</h3>
                        <p>שלום ,ברוך הבא חזרה לאימפריה שלך.</p>
                        <div style="margin-top:15px;">
                            <div style="display:flex; justify-content:space-between; font-size:12px; margin-bottom:5px;">
                                <span>התקדמות לרמה הבאה</span>
                                <span id="xp-text">0/1000 XP</span>
                            </div>
                            <div class="progress-container">
                                <div id="xp-bar" class="progress-bar xp-bar" style="width: 0%"></div>
                            </div>
                        </div>
                    </div>

                    <div class="grid-2 fade-in">
                        <div class="card" style="border: 1px solid var(--yellow); cursor: pointer;" onclick="if(typeof claimDailyGift === 'function') claimDailyGift(); else showStatus('🎁 מתנה תהיה זמינה בקרוב!', 'yellow');">
                            <div style="font-size: 1.5rem;">🎁</div>
                            <div style="font-size: 11px; font-weight: bold; margin-top: 5px;">מתנה יומית</div>
                        </div>

                        <div class="card" style="border: 1px solid var(--blue); background: rgba(56, 189, 248, 0.05); cursor: pointer;" onclick="document.getElementById('installModal').style.display='flex'">
                            <div style="font-size: 1.5rem;">📲</div>
                            <div style="font-size: 11px; font-weight: bold; margin-top: 5px; color: var(--blue);">התקנת אפליקציה</div>
                        </div>
                    </div>
                `;
                if(typeof updateUI === 'function') updateUI();
            } 
            else if(tabName === 'work') drawWork(content);
            else if(tabName === 'invest') drawMarket(content);
            else if(tabName === 'business') drawBusiness(content);
            else if(tabName === 'tasks') drawTasks(content);
            else if(tabName === 'estate') drawEstate(content);
            else if(tabName === 'skills') drawSkills(content);
            else if(tabName === 'bank') drawBank(content);
            else if(tabName === 'cars') drawCars(content);
            else if(tabName === 'market') drawMarket(content);
        }

        function closeInstallGuide() {
            document.getElementById('installModal').style.display = 'none';
        }

        // טעינה ראשונית של דף הבית
        document.addEventListener('DOMContentLoaded', () => {
            openTab('home');
        });
    </script>
</body>
</html>
