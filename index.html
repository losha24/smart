<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Smart Money Pro | v6.5.0</title>
    
    <link rel="manifest" href="manifest.json?v=6.5.0">
    <meta name="theme-color" content="#0f172a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="logo.png">
    
    <link rel="stylesheet" href="style.css?v=6.5.0">
    <style>
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 9999; justify-content: center; align-items: center; }
        .modal-card { width: 85%; max-width: 320px; text-align: center; padding: 25px; background: #1e293b; border-radius: 15px; border: 1px solid var(--blue); }
        
        /* עיצוב הודעת מנהל משופר */
        .admin-box {
            background: rgba(59, 130, 246, 0.15);
            border-right: 4px solid #3b82f6;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 15px;
            font-size: 14px;
            color: #fff;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            position: relative;
        }

        .edit-admin-btn {
            background: none;
            border: none;
            color: #3b82f6;
            cursor: pointer;
            font-size: 16px;
            position: absolute;
            left: 10px;
            top: 10px;
            opacity: 0.6;
            transition: opacity 0.2s;
        }
        .edit-admin-btn:hover { opacity: 1; }

        /* אנימציה חלקה לדיבאג ולהודעות */
        .fade-in { animation: fadeIn 0.5s ease-in; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body class="dark-theme">
    
    <header class="main-header">
        <img src="logo.png" alt="Smart Money Pro" class="header-logo-big" onclick="openTab('home')" style="cursor:pointer;">
    </header>

    <div class="stats-bar-top">
        <div class="stat-item">💰 <span id="money">0</span>₪</div>
        <div class="stat-item">🏦 <span id="bank">0</span>₪</div>
        <div class="stat-item">⭐ רמה <span id="life-level-ui">1</span></div>
    </div>

    <div id="status-bar" class="status-msg"></div>

    <nav class="topbar">
        <div class="nav-row">
            <button onclick="openTab('home')" id="btnHome" class="active">🏠 בית</button>
            <button onclick="openTab('work')" id="btnWork">⚒️ עבודות</button>
            <button onclick="openTab('tasks')" id="btnTasks">🎰 קזינו</button>
        </div>
        <div class="nav-row">
            <button onclick="openTab('invest')" id="btnInvest">📈 בורסה</button>
            <button onclick="openTab('business')" id="btnBusiness">🏢 עסקים</button>
            <button onclick="openTab('estate')" id="btnEstate">🏠 נדל"ן</button>
        </div>
        <div class="nav-row">
            <button onclick="openTab('skills')" id="btnSkills">🎓 כישורים</button>
            <button onclick="openTab('bank')" id="btnBank">🏦 בנק</button>
            <button onclick="openTab('cars')" id="btnCars">🚗 רכבים</button>
        </div>
        <div class="nav-row">
            <button onclick="openTab('market')" id="btnMarket">🛒 שוק</button>
            <button onclick="document.getElementById('installModal').style.display='flex'" class="sys-btn">📲</button>
            <button onclick="forceUpdate()" class="sys-btn">🔄</button>
            <button onclick="toggleTheme()" class="sys-btn">🌓</button>
        </div>
    </nav>

    <main id="content" class="fade-in container"></main>

    <div id="installModal" class="modal-overlay" onclick="closeInstallGuide()">
        <div class="modal-card" onclick="event.stopPropagation()">
            <h3>📲 התקנה</h3>
            <p id="android-instr">לחץ על 3 הנקודות בתפריט ובחר "התקן אפליקציה".</p>
            <p id="ios-instr" style="display:none;">לחץ על "שתף" ואז "הוסף למסך הבית".</p>
            <button class="action" onclick="closeInstallGuide()" style="background:#ef4444; color:#fff; width:100%;">סגור</button>
        </div>
    </div>

    <footer class="main-footer">
        © 2026 Smart Money Pro v6.5.0 | אלכסיי זבודיסקר
    </footer>

    <script src="js/core.js?v=6.5.0"></script>
    <script src="js/activities.js?v=6.5.0"></script>
    <script src="js/economy.js?v=6.5.0"></script>
    <script src="js/ui.js?v=6.5.0"></script>
    <script src="js/debug.js?v=1.3.0"></script>

    <script>
        // הגדרת הודעה גלובלית
        window.adminMsgText = "ברוכים הבאים אלכסיי! מערכת הדיבאג v1.3.0 הופעלה ומסונכרנת עם גרסה 6.5.0.";

        function showStatus(msg, type = 'blue') {
            const bar = document.getElementById('status-bar');
            if (!bar) return;
            const colors = { 'green': '#22c55e', 'red': '#ef4444', 'blue': '#3b82f6' };
            bar.innerText = msg;
            bar.style.backgroundColor = colors[type] || colors.blue;
            bar.style.opacity = "1";
            setTimeout(() => { bar.style.opacity = "0"; }, 3000);
        }

        // פונקציית ניווט מעודכנת שמשתמשת ב-window.openTab מה-ui.js
        function openTab(tabName) {
            // אם הפונקציה קיימת ב-ui.js (שם הוספנו אנימציות וניהול tab), נשתמש בה
            if (typeof window.openTab === 'function') {
                window.openTab(tabName);
                
                // הזרקת הודעת מנהל רק בטאב הבית
                if (tabName === 'home') {
                    setTimeout(() => {
                        const content = document.getElementById('content');
                        if (content && !document.querySelector('.admin-box')) {
                            const adminDiv = document.createElement('div');
                            adminDiv.className = 'admin-box fade-in';
                            adminDiv.innerHTML = `
                                📢 <b>הודעת מנהל:</b> 
                                <button onclick="window.editAdminMsg()" class="edit-admin-btn" title="עריכת הודעה">✏️</button>
                                <br><span id="admin-text-content">${window.adminMsgText}</span>
                            `;
                            content.prepend(adminDiv);
                        }
                    }, 150); // השהייה קלה כדי לוודא ש-drawHome סיים
                }
                return;
            }

            // Fallback למקרה שהקובץ ui.js לא נטען כראוי
            const content = document.getElementById('content');
            if (!content) return;
            document.querySelectorAll('.topbar button').forEach(btn => btn.classList.remove('active'));
            const activeBtn = document.getElementById('btn' + tabName.charAt(0).toUpperCase() + tabName.slice(1));
            if (activeBtn) activeBtn.classList.add('active');

            content.innerHTML = ""; 
            
            // שימוש ב-window כדי למצוא את הפונקציות בכל מקרה
            const drawFunc = window["draw" + tabName.charAt(0).toUpperCase() + tabName.slice(1)];
            if (typeof drawFunc === 'function') {
                drawFunc(content);
            } else {
                content.innerHTML = `<div class="card"><h3>שגיאה</h3><p>הפונקציה draw${tabName} לא נמצאה.</p></div>`;
            }
            
            if (typeof updateUI === 'function') updateUI();
        }

        function closeInstallGuide() { document.getElementById('installModal').style.display = 'none'; }

        document.addEventListener('DOMContentLoaded', () => {
            // טעינת הבית בסטארט-אפ
            setTimeout(() => openTab('home'), 200);
            
            if (/iPhone|iPad|iPod/i.test(navigator.userAgent)) {
                document.getElementById('android-instr').style.display = 'none';
                document.getElementById('ios-instr').style.display = 'block';
            }
        });
    </script>
</body>
</html>
