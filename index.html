<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#070b14">
    
    <title>Smart Money Pro v6.5.2 | Turbo</title>
    <link rel="stylesheet" href="style.css">
    
    <style>
        .app-loader { position: fixed; inset: 0; background: #070b14; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999; transition: 0.5s; }
        .spinner { width: 45px; height: 45px; border: 4px solid rgba(0, 210, 255, 0.1); border-top: 4px solid #00d2ff; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        .nav-row { display: flex; gap: 5px; margin-bottom: 5px; width: 100%; }
        .topbar button { flex: 1; min-width: 0; font-size: 11px; padding: 10px 2px; white-space: nowrap; }
        
        /* תיקון קטן לפוטר שיהיה לחיץ */
        .admin-footer-actions { margin-top: 40px; padding: 20px; text-align: center; }
        .reset-btn { background: none; border: 2px solid #ff3131; color: #ff3131; padding: 12px 30px; border-radius: 12px; font-weight: 900; cursor: pointer; }
    </style>
</head>
<body>

    <div id="main-loader" class="app-loader">
        <div class="spinner"></div>
        <h2 style="color:#00d2ff; margin-top:20px; font-family:sans-serif; letter-spacing: 2px;">SMART MONEY</h2>
    </div>

    <header class="main-header">
        <div class="header-logo-container" onclick="openTab('home')" style="cursor:pointer">
            <h1>SMART<span style="color:#fff">MONEY</span></h1>
            <div class="version-tag" style="font-size:9px; opacity:0.5; letter-spacing:2px; text-align:center;">PRO v6.5.2 TURBO</div>
        </div>
    </header>

    <section class="stats-bar-top">
        <div class="stat-item">💰 <span id="money">1,500</span></div>
        <div class="stat-item">🏦 <span id="bank">0</span></div>
        <div class="stat-item">⭐ רמה <span id="level-display">1</span></div>
    </section>

    <div id="status-bar" style="opacity:0; text-align:center; color:var(--blue); font-weight:bold; height:35px; line-height:35px;">המערכת מוכנה...</div>

    <nav class="topbar">
        <div class="nav-row">
            <button id="btn-home" onclick="openTab('home')" class="active">🏠 ראשי</button>
            <button id="btn-work" onclick="openTab('work')">⚒️ עבודה</button>
            <button id="btn-invest" onclick="openTab('invest')">📈 בורסה</button>
            <button id="btn-bank" onclick="openTab('bank')">🏦 בנק</button>
        </div>
        <div class="nav-row">
            <button id="btn-business" onclick="openTab('business')">🏢 עסקים</button>
            <button id="btn-estate" onclick="openTab('estate')">🏘️ נדל"ן</button>
            <button id="btn-cars" onclick="openTab('cars')">🚗 רכבים</button>
            <button id="btn-skills" onclick="openTab('skills')">🎓 כישורים</button>
        </div>
        <div class="nav-row">
            <button id="btn-market" onclick="openTab('market')">🛒 שוק</button>
            <button id="btn-casino" onclick="openTab('casino')">🎰 קזינו</button>
            <button onclick="toggleTheme()" title="החלף עיצוב" style="max-width:45px; background:rgba(255,255,255,0.05);">🌓</button>
            <button onclick="location.reload()" title="רענון כפוי" style="max-width:45px; background:rgba(255, 49, 49, 0.15); color:#ff3131;">🔄</button>
        </div>
    </nav>

    <main id="content" class="main-content container"></main>

    <div id="modal-overlay" style="display:none;" onclick="if(event.target == this) closeModal()">
        <div class="modal-box card fade-in">
            <div id="modal-header" style="display:flex; justify-content:space-between; align-items:center; border-bottom:1px solid rgba(56,189,248,0.2); padding-bottom:10px; margin-bottom:15px;">
                <h3 id="modal-title" style="margin:0; font-size:18px; color:#00d2ff;">פעולה במערכת</h3>
                <button onclick="closeModal()" style="background:none; border:none; color:white; font-size:26px; cursor:pointer;">&times;</button>
            </div>
            <div id="modal-body"></div>
        </div>
    </div>

    <div class="admin-footer-actions">
        <button onclick="resetGame()" class="reset-btn">
            ⚠️ איפוס נתונים כללי
        </button>
        <div style="margin-top: 25px; font-size: 11px; opacity: 0.5; line-height: 1.6;">
            <p>Smart Money Pro &copy; 2026 | <b>Alexei Zavodisker</b></p>
            <p style="letter-spacing: 1px;">BUILD: v6.5.2-TURBO-FINAL</p>
        </div>
    </div>

    <script src="js/core.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/activities.js"></script>
    <script src="js/economy.js"></script>

    <script>
        function closeModal() { document.getElementById('modal-overlay').style.display = 'none'; }
        
        function toggleTheme() {
            document.body.classList.toggle('light-theme');
            if(typeof showMsg === 'function') showMsg("העיצוב השתנה", "var(--blue)");
        }

        function resetGame() {
            if(confirm("אלכסיי, האם למחוק את כל ההתקדמות? הפעולה אינה הפיכה!")) {
                localStorage.clear();
                location.reload();
            }
        }

        window.addEventListener('load', () => {
            // טעינה וייזום
            if(typeof loadGame === 'function') loadGame();
            if(typeof openTab === 'function') openTab('home');

            const loader = document.getElementById('main-loader');
            setTimeout(() => {
                loader.style.opacity = '0';
                setTimeout(() => loader.style.display = 'none', 500);
            }, 800);
        });

        document.body.addEventListener('touchmove', function(e) {
            if (e.touches.length > 1) e.preventDefault();
        }, {passive: false});
    </script>
</body>
</html>
