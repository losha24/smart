<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Smart Money Pro | v6.8.0</title>
    
    <link rel="manifest" href="manifest.json?v=6.8.0">
    <meta name="theme-color" content="#0f172a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="logo.png">
    
    <link rel="stylesheet" href="style.css?v=6.8.0">
    <style>
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 9999; justify-content: center; align-items: center; }
        .modal-card { width: 85%; max-width: 320px; text-align: center; padding: 25px; background: #1e293b; border-radius: 15px; border: 1px solid var(--blue); }
        
        /* עיצוב הודעת מנהל משופר */
        .admin-box {
            background: rgba(59, 130, 246, 0.1);
            border-right: 4px solid var(--blue);
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 15px;
            font-size: 13px;
            color: #fff;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
            line-height: 1.4;
        }
    </style>
</head>
<body class="dark-theme">
    
    <header class="main-header">
        <img src="logo.png" alt="Smart Money Pro" class="header-logo-big" onclick="openTab('home')">
    </header>

    <div class="stats-bar-top">
        <div class="stat-item">💰 <span id="money">0</span>₪</div>
        <div class="stat-item">🏦 <span id="bank">0</span>₪</div>
        <div class="stat-item">⭐ רמה <span id="life-level-ui">1</span></div>
    </div>

    <div id="status-bar"></div>

    <nav class="topbar">
        <div class="nav-row">
            <button onclick="openTab('home')" id="btnHome" class="active">🏠 בית</button>
            <button onclick="openTab('work')" id="btnWork">⚒️ עבודות</button>
            <button onclick="openTab('tasks')" id="btnTasks">🎰 קזינו</button>
        </div>
        <div class="nav-row">
            <button onclick="openTab('market')" id="btnMarket">📈 בורסה</button>
            <button onclick="openTab('business')" id="btnBusiness">🏢 עסקים</button>
            <button onclick="openTab('estate')" id="btnEstate">🏠 נדל"ן</button>
        </div>
        <div class="nav-row">
            <button onclick="openTab('skills')" id="btnSkills">🎓 כישורים</button>
            <button onclick="openTab('bank')" id="btnBank">🏦 בנק</button>
            <button onclick="openTab('cars')" id="btnCars">🚗 רכבים</button>
        </div>
        <div class="nav-row">
            <button onclick="document.getElementById('installModal').style.display='flex'" class="sys-btn">📲</button>
            <button onclick="forceUpdate()" class="sys-btn">🔄</button>
            <button onclick="toggleTheme()" class="sys-btn">🌓</button>
        </div>
    </nav>

    <main id="content" class="fade-in container"></main>

    <div id="installModal" class="modal-overlay" onclick="closeInstallGuide()">
        <div class="modal-card" onclick="event.stopPropagation()">
            <h3>📲 התקנה</h3>
            <p id="android-instr">לחץ על 3 הנקודות בתפריט ובחר "התקן אפליקציה".</p>
            <p id="ios-instr" style="display:none;">לחץ על "שתף" ואז "הוסף למסך הבית".</p>
            <button class="action" onclick="closeInstallGuide()" style="background:var(--red); color:#fff; width:100%;">סגור</button>
        </div>
    </div>

    <footer class="main-footer">
        © 2026 Smart Money Pro v6.8.0 | אולג זבודיסקר
    </footer>

    <script src="js/core.js?v=6.8.0"></script>
    <script src="js/activities.js?v=6.8.0"></script>
    <script src="js/economy.js?v=6.8.0"></script>
    <script src="js/ui.js?v=6.8.0"></script>

    <script>
        const adminMsgText = "ברוך הבא! המערכת סונכרנה בהצלחה לגרסה 6.8.0. כל הנכסים והחובות שלך מוצגים כעת במרכז השליטה.";

        function showStatus(msg, type = 'blue') {
            const bar = document.getElementById('status-bar');
            if (!bar) return;
            const colors = { 
                'green': '#22c55e', 
                'red': '#ef4444', 
                'blue': '#3b82f6',
                'yellow': '#f59e0b'
            };
            bar.innerText = msg;
            bar.style.backgroundColor = colors[type] || colors.blue;
            bar.style.opacity = "1";
            setTimeout(() => { bar.style.opacity = "0"; }, 3000);
        }

        function openTab(tabName) {
            const content = document.getElementById('content');
            if (!content) return;

            // עדכון כפתור פעיל
            document.querySelectorAll('.topbar button').forEach(btn => btn.classList.remove('active'));
            const activeBtn = document.getElementById('btn' + tabName.charAt(0).toUpperCase() + tabName.slice(1));
            if (activeBtn) activeBtn.classList.add('active');

            content.innerHTML = ""; 

            // לוגיקת רינדור הטאבים
            if (tabName === 'home') {
                if (typeof drawHome === 'function') {
                    drawHome(content); 
                }
                
                // הזרקת הודעת מנהל מעל מרכז השליטה
                const adminDiv = document.createElement('div');
                adminDiv.className = 'admin-box fade-in';
                adminDiv.innerHTML = `📢 <b>הודעה:</b> ${adminMsgText}`;
                content.prepend(adminDiv);
            } 
            else if (tabName === 'work' && typeof drawWork === 'function') drawWork(content);
            else if (tabName === 'market' && typeof drawMarket === 'function') drawMarket(content);
            else if (tabName === 'business' && typeof drawBusiness === 'function') drawBusiness(content);
            else if (tabName === 'tasks' && typeof drawTasks === 'function') drawTasks(content);
            else if (tabName === 'estate' && typeof drawEstate === 'function') drawEstate(content);
            else if (tabName === 'skills' && typeof drawSkills === 'function') drawSkills(content);
            else if (tabName === 'bank' && typeof drawBank === 'function') drawBank(content);
            else if (tabName === 'cars' && typeof drawCars === 'function') drawCars(content);
            
            if (typeof updateUI === 'function') updateUI();
            saveGame(); // שמירה בכל מעבר טאב ליתר ביטחון
        }

        function closeInstallGuide() { document.getElementById('installModal').style.display = 'none'; }

        document.addEventListener('DOMContentLoaded', () => {
            // טעינת המשחק לפני פתיחת הטאב הראשון
            if (typeof loadGame === 'function') loadGame();
            
            openTab('home');

            // זיהוי מכשיר iOS להוראות התקנה
            if (/iPhone|iPad|iPod/i.test(navigator.userAgent)) {
                document.getElementById('android-instr').style.display = 'none';
                document.getElementById('ios-instr').style.display = 'block';
            }
        });

        // פונקציית עדכון כפוי לניקוי מטמון
        function forceUpdate() {
            if(confirm("לרענן את האפליקציה ולבדוק עדכונים?")) {
                window.location.reload(true);
            }
        }
    </script>
</body>
</html>
