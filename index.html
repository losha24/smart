<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gogo Online - Pro</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* הוספת עיצוב בסיסי לפוטר כדי שיישאר בתחתית */
        body {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            margin: 0;
        }
        main {
            flex: 1;
        }
        .footer-copyright {
            text-align: center;
            padding: 15px;
            font-size: 12px;
            color: gray;
            border-top: 1px solid rgba(128, 128, 128, 0.2);
            margin-top: 20px;
        }
    </style>
</head>
<body class="dark-theme" id="app-body">

    <div id="status-bar"></div>

    <header class="main-header">
        <div class="header-top">
            <button onclick="toggleTheme()" id="theme-btn" style="font-size: 20px; background: none; border: none; cursor: pointer;">☀️/🌙</button>
            <img src="logo.png" alt="Logo" class="app-logo-centered">
            <button onclick="resetGame()" style="background:none; border:none; color:gray; font-size:10px; cursor: pointer;">R</button>
        </div>
    </header>

    <div class="stats-bar-top">
        <div>💰 <span id="money">0</span>₪</div>
        <div>🏦 <span id="bank">0</span>₪</div>
        <div>📈 <span id="passive-ui">0</span>/s</div>
    </div>

    <nav class="topbar">
        <div class="nav-row">
            <button onclick="openTab('home')" id="btnHome" class="active">🏠 בית</button>
            <button onclick="openTab('work')" id="btnWork">⚒️ עבודה</button>
            <button onclick="openTab('tasks')" id="btnTasks">🎯 משימות</button>
            <button onclick="openTab('invest')" id="btnInvest">📈 בורסה</button>
        </div>
        <div class="nav-row">
            <button onclick="openTab('business')" id="btnBusiness">🏢 עסקים</button>
            <button onclick="openTab('realestate')" id="btnRealestate">🏠 נדל"ן</button>
            <button onclick="openTab('skills')" id="btnSkills">🎓 כישורים</button>
            <button onclick="openTab('bank')" id="btnBank">🏦 בנק</button>
        </div>
        <div class="nav-row">
            <button onclick="openTab('market')" id="btnMarket">🛒 שוק</button>
            <button onclick="openTab('install')" id="btnInstall">📲 התקנה</button>
        </div>
    </nav>

    <main id="content" class="fade-in"></main>

    <footer class="footer-copyright">
        <p>© 2026 Alexey Zavodisker. All Rights Reserved. | <b>Version 5.0.3</b></p>
    </footer>

    <script src="game.js"></script>
</body>
</html>
