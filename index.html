<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Smart Money AI v4.1.0 | Alexey Zavodisker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="dark-theme">

<header class="main-header">
    <button id="theme-toggle" onclick="toggleTheme()">🌓</button>
    <img src="logo.png" alt="Smart Money AI" class="app-logo">
    <div style="width: 40px;"></div>
</header>

<div id="status-bar"><span id="msg-text"></span></div>

<div class="stats-container">
    <div class="stat-card">💵 מזומן: <span id="money">0</span></div>
    <div class="stat-card">🏦 בנק: <span id="bank">0</span></div>
    <div class="stat-card">📈 פסיבי: <span id="passive-ui">0</span></div>
    <div class="stat-card">🎭 רמה: <span id="level-ui">1</span></div>
</div>

<nav class="topbar">
    <div class="nav-row">
        <button onclick="openTab('home')" id="btnHome">🏠 מצב</button>
        <button onclick="openTab('work')" id="btnWork">💼 עבודה</button>
    </div>
    <div class="nav-row">
        <button onclick="openTab('business')" id="btnBusiness">🏢 עסקים</button>
        <button onclick="openTab('realestate')" id="btnRealestate">🏘️ נדל"ן</button>
    </div>
    <div class="nav-row">
        <button onclick="openTab('stock')" id="btnStock">📈 בורסה</button>
        <button onclick="openTab('crypto')" id="btnCrypto">₿ קריפטו</button>
    </div>
    <div class="nav-row">
        <button onclick="openTab('bank')" id="btnBank">🏦 בנק</button>
        <button onclick="openTab('market')" id="btnMarket">🛒 שוק</button>
    </div>
    <div class="nav-row">
        <button onclick="openTab('skills')" id="btnSkills">🎓 כישורים</button>
        <button onclick="openTab('install')" id="btnInstall">📲 התקנה</button>
    </div>
    <div class="nav-row">
        <button onclick="resetGame()" id="btnReset" style="background:#450a0a; width:100%">🧹 איפוס מערכת</button>
    </div>
</nav>

<div id="content" class="fade-in"></div>

<footer class="main-footer">
    <p>© 2026 Alexey Zavodisker | Smart Money AI v4.1.0</p>
    <p>כל הזכויות שמורות</p>
</footer>

<script src="game.js"></script>
</body>
</html>
