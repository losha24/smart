<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Smart Money AI v3.1.2</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
</head>
<body>

<img src="logo.png" class="logo">

<div class="stats-container">
    <div class="stat-card">💵 מזומן: <span id="money">0</span></div>
    <div class="stat-card">🏦 בנק: <span id="bank">0</span></div>
    <div class="stat-card">⭐ רמה: <span id="level">1</span></div>
    <div class="stat-card">📈 פסיבי: <span id="passive">0</span></div>
</div>

<div class="xp-container">
    <div class="xpbar"><div id="xpfill"></div></div>
</div>

<div id="message-box"><div id="message">מוכן לעשות כסף?</div></div>

<div class="topbar">
    <button onclick="openTab('home')" id="btnHome" class="active">🏠 בית</button>
    <button onclick="openTab('work')" id="btnWork">💼 עבודה</button>
    <button onclick="openTab('invest')" id="btnInvest">📈 השקעות</button>
    <button onclick="openTab('bank')" id="btnBank">🏦 בנק</button>
    <button onclick="openTab('market')" id="btnMarket">🛒 שוק</button>
    <button onclick="openTab('tasks')" id="btnTasks">🎯 משימות</button>
</div>

<div id="content"></div>

<div style="padding: 20px;">
    <button class="action secondary" onclick="checkUpdate()">🔄 בדוק עדכון גרסה</button>
    <button class="action secondary" style="background:#ef4444" onclick="resetGame()">🧹 איפוס הכל</button>
</div>

<footer>Smart Money AI © 2026 | v3.1.2</footer>

<script src="game.js"></script>
<script>
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js');
    }
</script>
</body>
</html>
