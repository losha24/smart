<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Smart Money Pro | v6.1.4</title>
    
    <link rel="manifest" href="manifest.json?v=6.1.4">
    <meta name="theme-color" content="#0f172a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="logo.png">
    
    <link rel="stylesheet" href="style.css?v=6.1.4">
    <style>
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 9999; justify-content: center; align-items: center; }
        .modal-card { width: 85%; max-width: 320px; text-align: center; padding: 25px; background: #1e293b; border-radius: 15px; border: 1px solid var(--blue); }
        
        /* עיצוב הודעת מערכת/מנהל */
        .admin-box {
            background: rgba(59, 130, 246, 0.15);
            border-right: 4px solid var(--blue);
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 15px;
            font-size: 14px;
            color: #fff;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        /* הדגשת כפתור ניווט פעיל */
        .topbar button.active { 
            background: var(--blue) !important; 
            color: #000 !important; 
            font-weight: bold; 
            box-shadow: 0 0 10px var(--blue);
        }

        /* תיקון לבאר ההודעות הצף */
        #msg { 
            pointer-events: none; 
            transition: opacity 0.4s ease, transform 0.4s ease; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.6);
            z-index: 10001;
        }
    </style>
</head>
<body class="dark-theme">
    
    <header class="main-header">
        <img src="logo.png" alt="Smart Money Pro" class="header-logo-big" onclick="openTab('home')" style="cursor:pointer;">
    </header>

    <div class="stats-bar-top">
        <div class="stat-item">💰 <span id="money">0</span>₪</div>
        <div class="stat-item">🏦 <span id="bank">0</span>₪</div>
        <div class="stat-item">⭐ רמה <span id="life-level-ui">1</span></div>
    </div>

    <div id="msg" class="status-msg" style="opacity: 0; position: fixed; top: 80px; left: 50%; transform: translateX(-50%); padding: 12px 25px; border-radius: 12px; color: white; text-align: center; min-width: 250px;"></div>

    <nav class="topbar">
        <div class="nav-row">
            <button onclick="openTab('home')" id="nav-home">🏠 בית</button>
            <button onclick="openTab('work')" id="nav-work">⚒️ עבודות</button>
            <button onclick="openTab('tasks')" id="nav-tasks">🎰 קזינו</button>
        </div>
        <div class="nav-row">
            <button onclick="openTab('invest')" id="nav-invest">📈 בורסה</button>
            <button onclick="openTab('business')" id="nav-business">🏢 עסקים</button>
            <button onclick="openTab('estate')" id="nav-estate">🏠 נדל"ן</button>
        </div>
        <div class="nav-row">
            <button onclick="openTab('skills')" id="nav-skills">🎓 כישורים</button>
            <button onclick="openTab('bank')" id="nav-bank">🏦 בנק</button>
            <button onclick="openTab('cars')" id="nav-cars">🚗 רכבים</button>
        </div>
        <div class="nav-row">
            <button onclick="openTab('market')" id="nav-market">🛒 שוק</button>
            <button onclick="document.getElementById('installModal').style.display='flex'" class="sys-btn">📲</button>
            <button onclick="location.reload()" class="sys-btn">🔄</button>
            <button onclick="toggleTheme()" class="sys-btn">🌓</button>
        </div>
    </nav>

    <main id="content" class="container fade-in"></main>

    <div id="installModal" class="modal-overlay" onclick="this.style.display='none'">
        <div class="modal-card" onclick="event.stopPropagation()">
            <h3>📲 התקנת אפליקציה</h3>
            <p id="android-instr">לחץ על 3 הנקודות בתפריט ובחר "התקן אפליקציה".</p>
            <p id="ios-instr" style="display:none;">לחץ על "שתף" ואז "הוסף למסך הבית".</p>
            <button class="action" onclick="document.getElementById('installModal').style.display='none'" style="background:var(--red); color:#fff; width:100%;">סגור</button>
        </div>
    </div>

    <footer class="main-footer" style="padding: 20px 0 40px 0; opacity: 0.4; font-size: 10px;">
        © 2026 Smart Money Pro | נוצר ע"י אלכסיי זבודיסקר
    </footer>

    <script src="js/core.js?v=6.3.2"></script>
    <script src="js/ui.js?v=6.3.0"></script>
    <script src="js/activities.js?v=6.5.2"></script>
    <script src="js/economy.js?v=6.1.5"></script>

    <script>
        // פונקציית ניווט חכמה
        function openTab(tabName) {
            const content = document.getElementById('content');
            if (!content) return;

            // עדכון ויזואלי של הכפתורים
            document.querySelectorAll('.topbar button').forEach(btn => btn.classList.remove('active'));
            const activeBtn = document.getElementById('nav-' + tabName);
            if (activeBtn) activeBtn.classList.add('active');

            content.innerHTML = ""; 
            window.scrollTo(0,0);

            // מפת פונקציות לכל טאב
            const routes = {
                'home': typeof drawHome === 'function' ? drawHome : null,
                'work': typeof drawWork === 'function' ? drawWork : null,
                'invest': typeof drawInvest === 'function' ? drawInvest : null,
                'tasks': typeof drawTasks === 'function' ? drawTasks : null,
                'business': typeof drawBusiness === 'function' ? drawBusiness : null,
                'estate': typeof drawEstate === 'function' ? drawEstate : null,
                'skills': typeof drawSkills === 'function' ? drawSkills : null,
                'bank': typeof drawBank === 'function' ? drawBank : null,
                'cars': typeof drawCars === 'function' ? drawCars : null,
                'market': typeof drawMarket === 'function' ? drawMarket : null
            };

            if (routes[tabName]) {
                try {
                    routes[tabName](content);
                    // הודעה מיוחדת לטאב הבית
                    if (tabName === 'home') {
                        const adminDiv = document.createElement('div');
                        adminDiv.className = 'admin-box fade-in';
                        adminDiv.innerHTML = `📢 <b>מערכת:</b> ברוך הבא אלכסיי. הגרסה העדכנית (v6.1.4) מוכנה.`;
                        content.prepend(adminDiv);
                    }
                } catch (e) {
                    console.error("Error drawing tab:", e);
                    content.innerHTML = `<div class="card">שגיאה בטעינת הטאב: ${tabName}</div>`;
                }
            } else {
                content.innerHTML = `<div class="card" style="text-align:center; padding:50px;">
                    <h3>🚧 בקרוב</h3>
                    <p>האזור <b>${tabName}</b> נמצא כרגע בשלבי פיתוח.</p>
                </div>`;
            }

            // עדכון הנתונים בתצוגה
            if (typeof updateUI === 'function') updateUI();
        }

        // אתחול האפליקציה
        document.addEventListener('DOMContentLoaded', () => {
            // טעינת נתונים מה-Core
            if (typeof loadGame === 'function') loadGame();
            
            // פתיחת טאב הבית
            openTab('home');

            // זיהוי מכשיר להוראות התקנה
            if (/iPhone|iPad|iPod/i.test(navigator.userAgent)) {
                document.getElementById('android-instr').style.display = 'none';
                document.getElementById('ios-instr').style.display = 'block';
            }
        });
    </script>
</body>
</html>
