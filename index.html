<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="SmartMoney">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#0f172a">
    
    <title>Smart Money Pro v6.5.1 | Alexei Zavodisker</title>
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <link rel="stylesheet" href="style.css">

    <style>
        /* Loader Style מהיר שמוטמע באינדקס למניעת מסך לבן בטעינה */
        .app-loader {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #0f172a; display: flex; flex-direction: column;
            align-items: center; justify-content: center; z-index: 9999;
            transition: opacity 0.5s ease;
        }
        .spinner {
            width: 40px; height: 40px; border: 4px solid rgba(56, 189, 248, 0.1);
            border-top: 4px solid var(--blue); border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="main-loader" class="app-loader">
        <div class="spinner"></div>
        <h2 style="color:var(--blue); margin-top:20px; font-family:sans-serif;">SMART MONEY</h2>
        <p style="color:white; opacity:0.5; font-size:12px;">טוען מערכות כלכליות...</p>
    </div>

    <header class="main-header">
        <div class="header-logo-container" onclick="openTab('home')">
            <h1 style="margin:0; font-size:24px; color:var(--blue); font-weight:900;">SMART<span style="color:var(--text)">MONEY</span></h1>
            <div style="font-size:10px; opacity:0.6; text-align:center; letter-spacing:2px;">PROFESSIONAL v6.5.1</div>
        </div>
    </header>

    <section class="stats-bar-top">
        <div class="stat-item" title="מזומן">💰 <span id="money">0</span></div>
        <div class="stat-item" title="עובר ושב">🏦 <span id="bank">0</span></div>
        <div class="stat-item" title="רמת קריירה">⭐ רמה <span id="life-level-ui">1</span></div>
    </section>

    <div id="status-bar">המערכת מוכנה לפעולה</div>

    <nav class="topbar">
        <div class="nav-row">
            <button id="btnHome" onclick="openTab('home')">🏠 ראשי</button>
            <button id="btnWork" onclick="openTab('work')">⚒️ עבודה</button>
            <button id="btnInvest" onclick="openTab('invest')">📈 בורסה</button>
            <button id="btnBank" onclick="openTab('bank')">🏦 בנק</button>
        </div>
        <div class="nav-row">
            <button id="btnBusiness" onclick="openTab('business')">🏢 עסקים</button>
            <button id="btnEstate" onclick="openTab('estate')">🏘️ נדל"ן</button>
            <button id="btnCars" onclick="openTab('cars')">🚗 רכבים</button>
            <button id="btnSkills" onclick="openTab('skills')">🎓 כישורים</button>
        </div>
        <div class="nav-row">
            <button id="btnMarket" onclick="openTab('market')">🛒 שוק</button>
            <button id="btnTasks" onclick="openTab('tasks')">🎰 קזינו</button>
            <button onclick="toggleTheme()" id="theme-toggle">🌓</button>
            <button onclick="forceUpdate()" style="background:rgba(239, 68, 68, 0.2); color:var(--red);">🔄</button>
        </div>
    </nav>

    <main id="content" class="container">
        </main>

    <div id="modal-overlay" style="display:none;">
        <div class="modal-box card fade-in">
            <div id="modal-header" style="display:flex; justify-content:space-between; align-items:center; border-bottom:1px solid var(--border); padding-bottom:10px; margin-bottom:15px;">
                <h3 id="modal-title" style="margin:0;">כותרת</h3>
                <button onclick="closeModal()" style="background:none; border:none; color:var(--text); font-size:24px; cursor:pointer;">&times;</button>
            </div>
            <div id="modal-body">
                </div>
        </div>
    </div>

    <div class="quick-actions" style="display:none;">
        </div>

    <footer class="main-footer">
        <div style="border-top:1px solid var(--border); padding-top:15px; margin-top:20px;">
            <p><b>Smart Money Pro</b> &copy; 2026</p>
            <p>פותח ע"י אלכסיי זבודיסקר | Alexei Zavodisker</p>
            <p style="font-size:9px; opacity:0.3; margin-top:10px;">Version 6.5.1 Stable Build</p>
        </div>
    </footer>

    <script src="js/core.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/activities.js"></script>
    <script src="js/economy.js"></script>

    <script>
        // פונקציות תשתית לאינדקס
        function closeModal() {
            document.getElementById('modal-overlay').style.display = 'none';
        }

        // הסרת ה-Loader לאחר טעינה מלאה
        window.addEventListener('load', () => {
            const loader = document.getElementById('main-loader');
            setTimeout(() => {
                loader.style.opacity = '0';
                setTimeout(() => loader.style.display = 'none', 500);
            }, 800);
        });

        // מניעת משיכה לריענון (Pull to refresh) במובייל
        document.body.addEventListener('touchmove', function(e) {
            if (e.touches.length > 1) e.preventDefault();
        }, {passive: false});
    </script>

</body>
</html>
