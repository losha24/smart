<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Smart Money Pro</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <link rel="icon" href="logo.png">
    <link rel="apple-touch-icon" href="logo.png">
</head>
<body class="dark-theme" id="app-body">
    <header class="main-header">
        <div class="header-top">
            <button onclick="toggleTheme()" id="theme-btn" style="font-size:20px; background:none; border:none; cursor:pointer;">☀️/🌙</button>
            <h2 style="margin:0; color:var(--blue);">Smart Money</h2>
            <button onclick="resetGame()" style="color:gray; font-size:10px; background:none; border:none; cursor:pointer;">R</button>
        </div>
    </header>

    <div class="stats-bar-top">
        <div>💰 <span id="money">0</span>₪</div>
        <div>🏦 <span id="bank">0</span>₪</div>
        <div>📈 <span id="passive-ui">0</span>/s</div>
    </div>

    <nav class="topbar">
        <div class="nav-row">
            <button onclick="openTab('home')" id="btnHome" class="active">🏠 בית</button>
            <button onclick="openTab('work')" id="btnWork">⚒️ עבודה</button>
            <button onclick="openTab('tasks')" id="btnTasks">🎯 משימות</button>
            <button onclick="openTab('invest')" id="btnInvest">📈 בורסה</button>
        </div>
        <div class="nav-row">
            <button onclick="openTab('business')" id="btnBusiness">🏢 עסקים</button>
            <button onclick="openTab('realestate')" id="btnRealestate">🏠 נדל"ן</button>
            <button onclick="openTab('skills')" id="btnSkills">🎓 כישורים</button>
            <button onclick="openTab('bank')" id="btnBank">🏦 בנק</button>
        </div>
        <div class="nav-row">
            <button onclick="openTab('market')" id="btnMarket">🛒 שוק</button>
            <button onclick="openTab('install')" id="btnInstall">📲 התקנה</button>
        </div>
    </nav>

    <main id="content" class="fade-in"></main>

    <footer style="text-align:center; padding:15px; font-size:10px; opacity:0.6; color:gray;">
        © 2026 Alexey Zavodisker | Smart Money v5.1.0
    </footer>

    <script src="js/core.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/economy.js"></script>
    <script src="js/activities.js"></script>
</body>
</html>
