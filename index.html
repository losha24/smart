<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Smart Money AI v4.2</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="dark-theme">

<header class="main-header">
    <button id="theme-toggle" onclick="toggleTheme()">🌓</button>
    <div class="logo-container">
        <img src="logo.png" alt="Smart Money AI" class="app-logo">
    </div>
</header>

<div id="status-bar"><span id="msg-text">ברוך הבא לגרסה 4.2 | המתן לאירועים...</span></div>

<div class="stats-container">
    <div class="stat-card">💵 מזומן: <span id="money">0</span></div>
    <div class="stat-card">🏦 בנק: <span id="bank">0</span></div>
    <div class="stat-card">📈 פסיבי: <span id="passive-ui">0</span></div>
    <div class="stat-card">🎭 מוניטין: <span id="rep-ui">0</span></div>
</div>

<nav class="topbar">
    <div class="nav-row">
        <button onclick="openTab('home')" id="btnHome">🏠 בית</button>
        <button onclick="openTab('work')" id="btnWork">💼 עבודה</button>
        <button onclick="openTab('business')" id="btnBusiness">🏢 עסקים</button>
    </div>
    <div class="nav-row">
        <button onclick="openTab('realestate')" id="btnRealestate">🏘️ נדל"ן</button>
        <button onclick="openTab('market')" id="btnMarket">🛒 שוק</button>
        <button onclick="openTab('stock')" id="btnStock">💹 בורסה</button>
    </div>
    <div class="nav-row">
        <button onclick="openTab('tasks')" id="btnTasks">🎯 משימות</button>
        <button onclick="openTab('skills')" id="btnSkills">🎓 כישורים</button>
        <button onclick="openTab('bank')" id="btnBank">🏦 בנק</button>
    </div>
    <div class="nav-row">
        <button onclick="openTab('install')" id="btnInstall">📲 התקנה</button>
        <button onclick="checkUpdate()" id="btnUpdate" style="background:#334155">🔄 עדכון</button>
        <button onclick="resetGame()" id="btnReset" style="background:#450a0a">🧹 איפוס</button>
    </div>
</nav>

<div id="content"></div>

<footer>&copy; 2026 Alexey Zavodisker | Smart Money AI v4.2</footer>

<script src="game.js"></script>
</body>
</html>
