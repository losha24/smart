<!DOCTYPE html>
<html lang="he">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Smart Money</title>

<link rel="stylesheet" href="style.css">
<link rel="manifest" href="manifest.json">

</head>

<body>

<header>

<div class="topbar">

<div class="stats-left">

💰 <span id="money">0</span>

</div>

<img src="logo.png" class="logo">

<div class="stats-right">

🏦 <span id="bank">0</span>

</div>

</div>

<div class="levelBox">

<div class="levelText">
⭐ רמה <span id="level">1</span>
</div>

<div class="levelBar">

<div id="levelProgress"></div>

</div>

</div>

<div id="rewardBox"></div>

<div id="message"></div>

</header>

<div class="tabs">

<button onclick="showTab('work')">💼 עבודה</button>
<button onclick="showTab('invest')">📈 השקעות</button>
<button onclick="showTab('bankTab')">🏦 בנק</button>
<button onclick="resetGame()">♻️ איפוס</button>
<button onclick="updateGame()">🔄 עדכון</button>

</div>


<div id="work" class="tab">

<h2>עבודות</h2>

<button onclick="startJob(5,50,1)">משימה קטנה 5ש 💵50</button>

<button onclick="startJob(15,150,3)">עבודה משרדית 15ש 💵150</button>

<button onclick="startJob(30,400,7)">פרויקט קטן 30ש 💵400</button>

<button onclick="startJob(60,1000,15)">פרויקט גדול 60ש 💵1000</button>

<canvas id="progressCanvas"></canvas>

</div>


<div id="invest" class="tab">

<h2>השקעות</h2>

<button onclick="invest(200,1.5)">השקעה קטנה 200</button>

<button onclick="invest(500,2)">סטארטאפ 500</button>

<button onclick="invest(2000,3)">נדל״ן 2000</button>

<button onclick="invest(5000,5)">חברת טכנולוגיה 5000</button>

</div>


<div id="bankTab" class="tab">

<h2>בנק</h2>

<button onclick="deposit()">הפקד 500</button>

<button onclick="withdraw()">משוך 500</button>

<p>כסף בבנק מוגן ממשברים</p>

</div>

<footer>

<div id="passiveIncome"></div>

<div class="copyright">
© Smart Money Game
</div>

</footer>

<script src="game.js"></script>

</body>
</html>
