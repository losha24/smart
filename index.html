<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Money</title>
<link rel="stylesheet" href="css/style.css">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#2e7d32">
</head>
<body>

<header>
    <div class="logo-container">
        <img src="icons/logo.png" class="main-logo">
    </div>
    <h1>Smart Money</h1>
</header>

<nav>
    <button onclick="showSection('dashboard')">📊 מצב אישי</button>
    <button onclick="showSection('budget_section')">💰 תקציב</button>
    <button onclick="showSection('loan_section')">💳 הלוואה</button>
    <button onclick="showSection('mortgage_section')">🏠 משכנתא</button>
    <button onclick="exportData()" class="orange">📥 גיבוי</button>
    <button onclick="importData()" class="orange">📤 שחזור</button>
    <button id="installBtn" class="red">⬇️ התקנה</button>
    <button onclick="toggleDark()" class="gray">🌙 לילה</button>
    <button onclick="showAdminPrompt()" class="purple">🛠️ ניהול</button>
    <button onclick="forceUpdate()" class="blue">🔄 עדכון גרסה</button>
</nav>

<div id="dashboard" class="section active"></div>
<div id="budget_section" class="section"></div>
<div id="loan_section" class="section"></div>
<div id="mortgage_section" class="section"></div>

<footer>&copy; 2026 Smart Money | גרסה <span id="versionText"></span></footer>

<script src="js/storage.js" defer></script>
<script src="js/ui.js" defer></script>
<script src="js/app.js" defer></script>
<script src="js/version-check.js" defer></script>
<script src="js/update.js" defer></script>
<script src="js/install.js" defer></script>
<script src="js/auth.js" defer></script>
<script src="js/admin.js" defer></script>
<script src="js/loan.js" defer></script>
<script src="js/mortgage.js" defer></script>
<script src="js/maintenance.js" defer></script>

</body>
</html>
