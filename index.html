<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Smart Money Pro | v6.2.7</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0f172a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <link rel="stylesheet" href="style.css?v=6.2.7">
    
    <style>
        body { 
            margin: 0; 
            padding: 0; 
            background: #0f172a; 
            min-height: 100vh;
            display: block; 
            font-family: system-ui, -apple-system, sans-serif;
        }
        
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 20000; justify-content: center; align-items: center; }
        .modal-card { width: 85%; max-width: 320px; text-align: center; padding: 25px; background: #1e293b; border-radius: 15px; border: 1px solid var(--blue); }
        .topbar button.active { background: var(--blue) !important; color: #000 !important; font-weight: bold; }
        
        /* תיבת ההודעות - מיקום קבוע מעל הניווט */
        #msg { 
            position: fixed; 
            left: 50%; 
            transform: translateX(-50%); 
            z-index: 30000; 
            width: 90%; 
            max-width: 380px; 
            text-align: center; 
            pointer-events: none; 
            opacity: 0;
            bottom: 125px; /* גובה מעל שורות הכפתורים */
            transition: all 0.3s ease;
        }

        /* עיצוב התיבה עצמה (מיועד להזרקה מה-JS) */
        .msg-box {
            display: inline-block;
            background: #1e293b;
            border: 2px solid var(--blue);
            padding: 12px 24px;
            border-radius: 14px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.6);
            color: white;
            font-weight: bold;
            font-size: 14px;
            min-width: 200px;
        }

        main#content {
            display: block;
            width: 100%;
            padding-top: 10px;
            padding-bottom: 220px; /* מרווח כדי שהתוכן לא יתנגש בתיבה */
        }

        .stats-bar-top { position: sticky; top: 0; z-index: 1000; background: #0f172a; padding: 10px 0; }
        .topbar { z-index: 1500; }
    </style>
</head>
<body class="dark-theme">
    
    <header class="main-header">
        <img src="logo.png" alt="Smart Money Pro" class="header-logo-big" onclick="openTab('home')" style="cursor:pointer;">
    </header>

    <div class="stats-bar-top">
        <div class="stat-item">💰 <span id="money">0</span>₪</div>
        <div class="stat-item">🏦 <span id="bank">0</span>₪</div>
        <div class="stat-item">⭐ רמה <span id="life-level-ui">1</span></div>
    </div>

    <div id="msg"></div>

    <nav class="topbar">
        <div class="nav-row">
            <button onclick="openTab('home')" id="nav-home">🏠 בית</button>
            <button onclick="openTab('work')" id="nav-work">⚒️ עבודות</button>
            <button onclick="openTab('tasks')" id="nav-tasks">🎰 קזינו</button>
        </div>
        <div class="nav-row">
            <button onclick="openTab('invest')" id="nav-invest">📈 בורסה</button>
            <button onclick="openTab('business')" id="nav-business">🏢 עסקים</button>
            <button onclick="openTab('estate')" id="nav-estate">🏠 נדל"ן</button>
        </div>
        <div class="nav-row">
            <button onclick="openTab('skills')" id="nav-skills">🎓 כישורים</button>
            <button onclick="openTab('bank')" id="nav-bank">🏦 בנק</button>
            <button onclick="openTab('cars')" id="nav-cars">🚗 רכבים</button>
        </div>
        <div class="nav-row">
            <button onclick="openTab('market')" id="nav-market">🛒 שוק</button>
            <button onclick="document.getElementById('installModal').style.display='flex'" class="sys-btn">📲</button>
            <button onclick="location.reload()" class="sys-btn">🔄</button>
            <button onclick="toggleTheme()" class="sys-btn">🌓</button>
        </div>
    </nav>

    <main id="content" class="container fade-in"></main>

    <div id="installModal" class="modal-overlay" onclick="this.style.display='none'">
        <div class="modal-card" onclick="event.stopPropagation()">
            <h3>📲 התקנה</h3>
            <p id="android-instr">לחץ על 3 הנקודות בתפריט ובחר "התקן אפליקציה".</p>
            <p id="ios-instr" style="display:none;">לחץ על "שתף" ואז "הוסף למסך הבית".</p>
            <button class="action" onclick="document.getElementById('installModal').style.display='none'" style="background:var(--red); color:#fff; width:100%;">סגור</button>
        </div>
    </div>

    <footer class="main-footer" style="padding-bottom: 50px; opacity: 0.5;">
        © 2026 Smart Money Pro | אלכסיי זבודיסקר
    </footer>

    <script src="js/core.js?v=6.3.2"></script>
    <script src="js/ui.js?v=6.2.7"></script>
    <script src="js/activities.js?v=6.6.0"></script>
    <script src="js/economy.js?v=6.1.5"></script>

    <script>
        function openTab(tabName) {
            const content = document.getElementById('content');
            if (!content) return;

            document.querySelectorAll('.topbar button').forEach(btn => btn.classList.remove('active'));
            const activeBtn = document.getElementById('nav-' + tabName);
            if (activeBtn) activeBtn.classList.add('active');

            content.innerHTML = "";
            window.scrollTo(0,0);

            try {
                const drawFunc = "draw" + tabName.charAt(0).toUpperCase() + tabName.slice(1);
                if (typeof window[drawFunc] === 'function') {
                    window[drawFunc](content);
                } else {
                    content.innerHTML = `<div class="card" style="text-align:center;"><h3>🚧 בקרוב</h3><p>האזור בבנייה</p></div>`;
                }
                if (typeof updateUI === 'function') updateUI();
            } catch (err) {
                console.error("Tab Error:", err);
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            if (typeof loadGame === 'function') loadGame();
            setTimeout(() => {
                if (typeof updateUI === 'function') updateUI();
                openTab('home');
            }, 300);
        });
    </script>
</body>
</html>
