<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Smart Money Pro | v6.2.2</title>
    <link rel="stylesheet" href="style.css?v=6.2.2">
    <style>
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 9999; justify-content: center; align-items: center; }
        .modal-card { width: 85%; max-width: 320px; text-align: center; padding: 30px; border: 1px solid var(--blue); background: #1e293b; border-radius: 20px; }
    </style>
</head>
<body class="dark-theme">
    
    <header class="main-header">
        <img src="logo.png" alt="Smart Money Pro" class="header-logo-big" onclick="openTab('home')" style="cursor:pointer;">
    </header>

    <div class="stats-bar-top">
        <div class="stat-item">💰 <span id="money">0</span>₪</div>
        <div class="stat-item">🏦 <span id="bank">0</span>₪</div>
        <div class="stat-item">⭐ רמה <span id="life-level-ui">1</span></div>
    </div>

    <div id="status-bar" class="status-msg"></div>

    <nav class="topbar">
        <div class="nav-row">
            <button onclick="openTab('home')" id="btnHome" class="active">🏠 בית</button>
            <button onclick="openTab('work')" id="btnWork">⚒️ עבודות</button>
            <button onclick="openTab('tasks')" id="btnTasks">🎰 קזינו</button>
        </div>
        <div class="nav-row">
            <button onclick="openTab('invest')" id="btnInvest">📈 בורסה</button>
            <button onclick="openTab('business')" id="btnBusiness">🏢 עסקים</button>
            <button onclick="openTab('estate')" id="btnEstate">🏠 נדל"ן</button>
        </div>
        <div class="nav-row">
            <button onclick="openTab('skills')" id="btnSkills">🎓 כישורים</button>
            <button onclick="openTab('bank')" id="btnBank">🏦 בנק</button>
            <button onclick="openTab('cars')" id="btnCars">🚗 רכבים</button>
        </div>
        <div class="nav-row">
            <button onclick="openTab('market')" id="btnMarket">🛒 שוק</button>
            <button onclick="forceUpdate()" class="sys-btn">🔄 עדכון</button>
            <button onclick="toggleTheme()" class="sys-btn">🌓 מצב</button>
        </div>
    </nav>

    <main id="content" class="fade-in container"></main>

    <div id="installModal" class="modal-overlay" onclick="closeInstallGuide()">
        <div class="modal-card" onclick="event.stopPropagation()">
            <div style="font-size: 3rem;">📲</div>
            <h3>התקנת האפליקציה</h3>
            <p>לחץ על 3 הנקודות בתפריט ובחר "התקן אפליקציה".</p>
            <button class="action" onclick="closeInstallGuide()" style="background:var(--red); color:#fff; width: 100%; margin-top:15px;">סגור</button>
        </div>
    </div>

    <footer class="main-footer">© 2026 Smart Money Pro v6.2.2 | אלכסיי זבודיסקר</footer>

    <script src="js/core.js?v=6.2.2"></script>
    <script src="js/activities.js?v=6.2.2"></script>
    <script src="js/economy.js?v=6.2.2"></script>
    <script src="js/ui.js?v=6.2.2"></script>

    <script>
        const adminMessage = "ברוכים הבאים ל-Smart Money Pro! תתחילו לעבוד ולבנות את האימפריה שלכם.";

        // פונקציה לעדכון נתונים מורחב בבית
        function refreshHomeUI() {
            if (typeof updateUI === 'function') updateUI();
            
            // עדכון המונים נוספים בתוך כרטיס הבית
            const bizDisplay = document.getElementById('biz-count');
            const carDisplay = document.getElementById('car-count');
            const moneyDisplay = document.getElementById('money-display');
            
            if (bizDisplay && typeof businesses !== 'undefined') bizDisplay.innerText = businesses.length || 0;
            if (carDisplay && typeof myCars !== 'undefined') carDisplay.innerText = myCars.length || 0;
            if (moneyDisplay) moneyDisplay.innerText = Number(money).toLocaleString();
        }

        function claimDailyGift() {
            const now = Date.now();
            const lastGift = localStorage.getItem('lastDailyGift') || 0;
            const cooldown = 24 * 60 * 60 * 1000;

            if (now - lastGift < cooldown) {
                const hoursLeft = Math.ceil((cooldown - (now - lastGift)) / (1000 * 60 * 60));
                if(window.showStatus) showStatus(`🎁 חזור בעוד ${hoursLeft} שעות.`, 'yellow');
                else alert(`חזור בעוד ${hoursLeft} שעות.`);
                return;
            }

            // הוספת הכסף למשתנה הגלובלי
            if (typeof money !== 'undefined') {
                const gift = 1500;
                money += gift;
                localStorage.setItem('lastDailyGift', now);
                if(window.saveGame) saveGame();
                refreshHomeUI();
                showStatus(`🎁 קיבלת ${gift}₪!`, 'green');
            }
        }

        function openTab(tabName) {
            const content = document.getElementById('content');
            document.querySelectorAll('.topbar button').forEach(btn => btn.classList.remove('active'));
            const activeBtn = document.getElementById('btn' + tabName.charAt(0).toUpperCase() + tabName.slice(1));
            if(activeBtn) activeBtn.classList.add('active');

            content.innerHTML = ""; 

            if(tabName === 'home') {
                content.innerHTML = `
                    <div class="card fade-in" style="border-right: 4px solid var(--purple);">
                        <h3 style="margin:0; color:var(--purple); font-size: 16px;">📢 הודעת מנהל</h3>
                        <p style="font-size: 14px;">${adminMessage}</p>
                    </div>

                    <div class="card fade-in">
                        <div style="display:flex; justify-content:space-between; font-size:12px; margin-bottom:8px;">
                            <span>רמה <span id="life-level-ui-home">1</span></span>
                            <span id="xp-text-home" style="color:var(--blue); font-weight:bold;">0/1000 XP</span>
                        </div>
                        <div class="progress-container" style="margin:0;"><div id="xp-bar-home" class="progress-bar xp-bar" style="width: 0%"></div></div>
                    </div>

                    <div class="grid-2 fade-in">
                        <div class="card" style="border: 1px solid var(--yellow); text-align:center; cursor:pointer;" onclick="claimDailyGift()">
                            <div style="font-size: 1.5rem;">🎁</div>
                            <div style="font-size: 12px; font-weight:bold;">מתנה יומית</div>
                        </div>
                        <div class="card" style="border: 1px solid var(--blue); text-align:center; cursor:pointer;" onclick="document.getElementById('installModal').style.display='flex'">
                            <div style="font-size: 1.5rem;">📲</div>
                            <div style="font-size: 12px; font-weight:bold; color:var(--blue);">התקנה</div>
                        </div>
                    </div>

                    <div class="card fade-in" style="border-right: 4px solid var(--green);">
                        <h4 style="margin:0 0 10px 0;">📊 מצב עו"ש</h4>
                        <div style="font-size: 18px; font-weight: bold; color: var(--green);">₪<span id="money-display">0</span></div>
                        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px; font-size:12px; margin-top:10px;">
                            <div>🏢 עסקים: <b id="biz-count">0</b></div>
                            <div>🚗 רכבים: <b id="car-count">0</b></div>
                        </div>
                    </div>

                    <div class="card fade-in" style="border: 1px solid var(--red); text-align:center; cursor:pointer; opacity: 0.6;" onclick="if(confirm('לאפס הכל?')) { localStorage.clear(); location.reload(); }">
                        <div style="color: var(--red); font-size: 11px;">⚠️ איפוס משחק</div>
                    </div>
                `;
                refreshHomeUI();
            } 
            else if(tabName === 'work') drawWork(content);
            else if(tabName === 'invest') drawInvest(content);
            else if(tabName === 'business') drawBusiness(content);
            else if(tabName === 'tasks') drawTasks(content);
            else if(tabName === 'estate') drawEstate(content);
            else if(tabName === 'skills') drawSkills(content);
            else if(tabName === 'bank') drawBank(content);
            else if(tabName === 'cars') drawCars(content);
            else if(tabName === 'market') drawMarket(content);
        }

        function closeInstallGuide() { document.getElementById('installModal').style.display = 'none'; }
        document.addEventListener('DOMContentLoaded', () => openTab('home'));
    </script>
</body>
</html>
