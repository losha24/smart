<!DOCTYPE html>
<html lang="he" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>כסף חכם</title>

<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="css/style.css">

</head>


<body>


<header class="header">

<img src="assets/logo.png" class="logo">

<div class="topButtons">

<button onclick="checkVersion()">בדוק עדכון</button>

<button onclick="openAdmin()">ניהול</button>

<button id="installBtn">התקן אפליקציה</button>

</div>

</header>


<section class="summary">

<h2>מצב אישי</h2>

<p>הכנסות:
<span class="income" id="income">0</span>
</p>

<p>הוצאות:
<span class="expense" id="expenses">0</span>
</p>

<p>פנוי:
<span class="balance" id="balance">0</span>
</p>

</section>



<section class="actions">

<button onclick="addIncome()">הוסף הכנסה</button>

<button onclick="addExpense()">הוסף הוצאה</button>

<button onclick="resetData()">איפוס</button>

</section>


<script src="js/storage.js"></script>
<script src="js/app.js"></script>
<script src="js/auth.js"></script>
<script src="js/admin.js"></script>
<script src="js/loan.js"></script>
<script src="js/mortgage.js"></script>
<script src="js/update.js"></script>


<script>

if ("serviceWorker" in navigator){

navigator.serviceWorker.register("sw/service-worker.js")

}

</script>


</body>
</html>
