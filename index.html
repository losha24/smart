<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>כסף חכם</title>

<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="style.css">

</head>

<body>

<h1>כסף חכם</h1>

<div id="loginBox">

<h3>כניסה למערכת</h3>

<input type="password" id="password" placeholder="הכנס סיסמה">

<button onclick="login()">כניסה</button>

</div>

<div id="app" style="display:none">

<h2>ניהול תקציב</h2>

<input id="desc" placeholder="תיאור">
<input id="amount" type="number" placeholder="סכום">

<br>

<button onclick="addIncome()">הכנסה</button>
<button onclick="addExpense()">הוצאה</button>

<ul id="list"></ul>

<h3 id="balance"></h3>

<br>

<button onclick="resetData()">איפוס נתונים</button>

<button onclick="checkUpdate()">בדיקת עדכון</button>

<button onclick="changePassword()">שינוי סיסמה</button>

</div>

<footer>

© כסף חכם  
<span id="version"></span>

</footer>

<script src="storage.js"></script>
<script src="auth.js"></script>
<script src="app.js"></script>
<script src="update.js"></script>

<script>

document.getElementById("version").innerText="גרסה 1.1.0"

if("serviceWorker" in navigator){

navigator.serviceWorker.register("service-worker.js")

}

</script>

</body>
</html>
