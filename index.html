<!DOCTYPE html>
<html lang="he">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Smart Money</title>

<link rel="stylesheet" href="style.css">
<link rel="manifest" href="manifest.json">

</head>

<body>

<header>

<img src="logo.png" class="logo">

<div class="topbar">

<div>💰 <span id="money">0</span></div>

<div>🏦 <span id="bank">0</span></div>

<div>⭐ <span id="level">1</span></div>

</div>

<div id="message"></div>

</header>


<div class="tabs">

<button onclick="showTab('home')">🏠 בית</button>
<button onclick="showTab('work')">💼 עבודה</button>
<button onclick="showTab('invest')">📈 השקעות</button>
<button onclick="showTab('bankTab')">🏦 בנק</button>
<button onclick="resetGame()">♻️</button>

</div>


<div id="home" class="tab">

<h2>סטטיסטיקות</h2>

<p>כסף: <span id="homeMoney"></span></p>

<p>השקעתי: <span id="homeInvest"></span></p>

<p>הפסדים: <span id="homeLoss"></span></p>

<p>בבנק: <span id="homeBank"></span></p>

<p>הכנסה פסיבית: <span id="homePassive"></span></p>

<p>כל כמה זמן: <span id="homeTimer"></span></p>

</div>


<div id="work" class="tab">

<h2>עבודות</h2>

<button onclick="startJob(5,50)">שליחות קטנה</button>

<button onclick="startJob(15,150)">עבודה משרדית</button>

<button onclick="startJob(30,350)">בניית אתר</button>

<button onclick="startJob(60,900)">פרויקט גדול</button>

<button onclick="startJob(90,2000)">ייעוץ עסקי</button>

<canvas id="progressCanvas"></canvas>

</div>


<div id="invest" class="tab">

<h2>השקעות</h2>

<button onclick="invest(200)">קריפטו</button>

<button onclick="invest(500)">סטארטאפ</button>

<button onclick="invest(1500)">מסחר</button>

<button onclick="invest(3000)">נדל״ן</button>

<button onclick="invest(7000)">חברת AI</button>

</div>


<div id="bankTab" class="tab">

<h2>בנק</h2>

<button onclick="deposit()">הפקד 500</button>

<button onclick="withdraw()">משוך 500</button>

</div>

<footer>

© Smart Money Game

</footer>

<script src="game.js"></script>

</body>
</html>
