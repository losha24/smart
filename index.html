<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Smart Money AI v3.8.9</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* מניעת גלילה לצדדים ואופטימיזציה למובייל */
        html, body { overflow-x: hidden; width: 100%; margin: 0; padding: 0; touch-action: manipulation; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    </style>
</head>
<body class="dark-theme">

<header class="main-header">
    <button id="theme-toggle" onclick="toggleTheme()">🌓</button>
    <img src="logo.png" alt="Smart Money AI" class="app-logo">
    <div style="width: 40px;"></div> </header>

<div id="status-bar"><span id="msg-text">Smart Money AI v3.8.9 | מוכן</span></div>

<div class="stats-container">
    <div class="stat-card">💵 מזומן: <span id="money">0</span></div>
    <div class="stat-card">🏦 בנק: <span id="bank">0</span></div>
    <div class="stat-card">📈 פסיבי: <span id="passive-ui">0</span></div>
    <div class="stat-card">🎭 מוניטין: <span id="rep-ui">0</span></div>
</div>

<nav class="topbar">
    <div class="nav-row">
        <button onclick="openTab('home')" id="btnHome">🏠 בית</button>
        <button onclick="openTab('work')" id="btnWork">💼 עבודה</button>
        <button onclick="openTab('business')" id="btnBusiness">🏢 עסקים</button>
    </div>
    <div class="nav-row">
        <button onclick="openTab('realestate')" id="btnRealestate">🏘️ נדל"ן</button>
        <button onclick="openTab('market')" id="btnMarket">🛒 שוק</button>
        <button onclick="openTab('install')" id="btnInstall">📲 התקנה</button>
    </div>
</nav>

<div id="content" class="fade-in"></div>

<script src="game.js"></script>
</body>
</html>
