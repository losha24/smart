<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Smart Money Pro | v6.3.4</title>
    
    <link rel="manifest" href="manifest.json?v=6.3.4">
    <meta name="theme-color" content="#0f172a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="logo.png">
    
    <link rel="stylesheet" href="style.css?v=6.3.4">
    <style>
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 9999; justify-content: center; align-items: center; }
        .modal-card { width: 85%; max-width: 320px; text-align: center; padding: 25px; background: #1e293b; border-radius: 15px; border: 1px solid var(--blue); }
        
        /* עיצוב הודעת מנהל משופר */
        .admin-box {
            background: rgba(59, 130, 246, 0.15);
            border-right: 4px solid var(--blue);
            padding: 15px;
            border-radius: 10px;
            margin: 10px 0 20px 0;
            font-size: 14px;
            color: #fff;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }
    </style>
</head>
<body class="dark-theme">
    
    <header class="main-header">
        <img src="logo.png" alt="Smart Money Pro" class="header-logo-big" onclick="openTab('home')" style="cursor:pointer;">
    </header>

    <div class="stats-bar-top">
        <div class="stat-item">💰 <span id="money">0</span>₪</div>
        <div class="stat-item">🏦 <span id="bank">0</span>₪</div>
        <div class="stat-item">⭐ רמה <span id="life-level-ui">1</span></div>
    </div>

    <div id="status-bar" class="status-msg"></div>

    <nav class="topbar">
        <div class="nav-row">
            <button onclick="openTab('home')" id="btnHome" class="active">🏠 בית</button>
            <button onclick="openTab('work')" id="btnWork">⚒️ עבודות</button>
            <button onclick="openTab('tasks')" id="btnTasks">🎰 קזינו</button>
        </div>
        <div class="nav-row">
            <button onclick="openTab('invest')" id="btnInvest">📈 בורסה</button>
            <button onclick="openTab('business')" id="btnBusiness">🏢 עסקים</button>
            <button onclick="openTab('estate')" id="btnEstate">🏠 נדל"ן</button>
        </div>
        <div class="nav-row">
            <button onclick="openTab('skills')" id="btnSkills">🎓 כישורים</button>
            <button onclick="openTab('bank')" id="btnBank">🏦 בנק</button>
            <button onclick="openTab('cars')" id="btnCars">🚗 רכבים</button>
        </div>
        <div class="nav-row">
            <button onclick="openTab('market')" id="btnMarket">🛒 שוק</button>
            <button onclick="triggerInstall()" class="sys-btn">📲</button>
            <button onclick="forceUpdate()" class="sys-btn">🔄</button>
            <button onclick="toggleTheme()" class="sys-btn">🌓</button>
        </div>
    </nav>

    <main id="content" class="fade-in container"></main>

    <div id="installModal" class="modal-overlay" onclick="this.style.display='none'">
        <div class="modal-card" onclick="event.stopPropagation()">
            <h3>📲 התקנה</h3>
            <p id="android-instr">לחץ על 3 הנקודות בתפריט ובחר "התקן אפליקציה".</p>
            <p id="ios-instr" style="display:none;">לחץ על "שתף" ואז "הוסף למסך הבית".</p>
            <button class="action" onclick="this.parentElement.parentElement.style.display='none'" style="background:var(--red); color:#fff; width:100%;">סגור</button>
        </div>
    </div>

    <footer class="main-footer">
        © 2026 Smart Money Pro v6.3.4 | אלכסיי זבודיסקר
    </footer>

    <script src="js/core.js?v=6.3.4"></script>
    <script src="js/activities.js?v=6.3.4"></script>
    <script src="js/economy.js?v=6.3.4"></script>
    <script src="js/ui.js?v=6.3.4"></script>

    <script>
        // הודעת המנהל שלך - תופיע בטאב הבית מעל התוכן
        const adminMsgText = "ברוכים הבאים אלכסיי! הגרסה עודכנה ל-6.3.4. המנוע עכשיו מהיר פי 2.5!";

        // פונקציה להזרקת הודעת המנהל לתוך הבית
        function injectAdminMsg() {
            const content = document.getElementById('content');
            if (content && !document.querySelector('.admin-box')) {
                const adminDiv = document.createElement('div');
                adminDiv.className = 'admin-box fade-in';
                adminDiv.innerHTML = `📢 <b>הודעת מנהל:</b><br>${adminMsgText}`;
                content.prepend(adminDiv);
            }
        }

        // דריסת הפונקציה openTab כדי להוסיף את הודעת המנהל בבית
        const originalOpenTab = window.openTab;
        window.openTab = function(tabName) {
            if (typeof originalOpenTab === 'function') {
                originalOpenTab(tabName);
                // אם עברנו לבית, נחכה רגע שה-UI יצייר ואז נזריק הודעה
                if (tabName === 'home') {
                    setTimeout(injectAdminMsg, 150);
                }
            }
        };

        document.addEventListener('DOMContentLoaded', () => {
            // זיהוי מכשירי אפל להוראות התקנה
            if (/iPhone|iPad|iPod/i.test(navigator.userAgent)) {
                document.getElementById('android-instr').style.display = 'none';
                document.getElementById('ios-instr').style.display = 'block';
            }
        });
    </script>
</body>
</html>
