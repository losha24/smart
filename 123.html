<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyBudget Live | Alexey</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root { --primary: #2e7d32; --danger: #d32f2f; --bg: #f4f7f6; --white: #ffffff; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 10px; }
        .container { max-width: 500px; margin: auto; }
        
        /* סיכום */
        .main-card { background: var(--primary); color: white; padding: 20px; border-radius: 20px; text-align: center; margin-bottom: 15px; }
        .main-card h2 { margin: 5px 0; font-size: 2rem; }

        /* טבלה */
        .section { background: var(--white); border-radius: 15px; padding: 15px; margin-bottom: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .row { display: grid; grid-template-columns: 2fr 1fr 1fr 0.5fr; padding: 12px 0; border-bottom: 1px solid #eee; align-items: center; }
        .row:last-child { border-bottom: none; }
        .amt { font-weight: bold; text-align: left; }
        .delete-btn { color: #ccc; cursor: pointer; text-align: center; }
        .delete-btn:hover { color: var(--danger); }

        /* טופס הוספה */
        .add-form { display: none; background: white; padding: 20px; border-radius: 20px; margin-bottom: 15px; border: 2px solid var(--primary); }
        input, select { width: 100%; padding: 10px; margin: 5px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        .btn-group { display: flex; gap: 10px; margin-top: 10px; }
        button { flex: 1; padding: 12px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; }
        .btn-save { background: var(--primary); color: white; }
        .btn-cancel { background: #eee; }

        .fab { position: fixed; bottom: 20px; left: 20px; background: var(--primary); color: white; width: 60px; height: 60px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 24px; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
    </style>
</head>
<body>

<div class="container">
    <div class="main-card">
        <small>נשאר ביד (נטו)</small>
        <h2 id="netoDisplay">₪ 0</h2>
    </div>

    <div class="add-form" id="addForm">
        <h3>הוספת נתון חדש</h3>
        <select id="fType"><option value="income">הכנסה</option><option value="expense">הוצאה</option></select>
        <input type="text" id="fName" placeholder="שם (למשל: חשמל)">
        <input type="number" id="fAmt" placeholder="סכום">
        <input type="text" id="fSrc" placeholder="מקור (למשl: מרכנתיל)">
        <div class="btn-group">
            <button class="btn-save" onclick="saveNewItem()">שמור</button>
            <button class="btn-cancel" onclick="toggleForm()">ביטול</button>
        </div>
    </div>

    <div class="section">
        <b>הכנסות</b>
        <div id="incList"></div>
    </div>

    <div class="section">
        <b>הוצאות</b>
        <div id="expList"></div>
    </div>
</div>

<div class="fab" onclick="toggleForm()"><i class="fas fa-plus"></i></div>

<script>
    // טעינת נתונים מהזיכרון של הדפדפן או שימוש בברירת מחדל מהאקסל
    let myData = JSON.parse(localStorage.getItem('budget_alexey')) || {
        incomes: [
            { name: "משכורות", amt: 14701, src: "בנק" },
            { name: "קצבאות", amt: 4089, src: "ביטוח לאומי" }
        ],
        expenses: [
            { name: "משכנתא", amt: 5323, src: "בנק" },
            { name: "ארנונה", amt: 309, src: "מרכנתיל" }
        ]
    };

    function toggleForm() {
        const form = document.getElementById('addForm');
        form.style.display = form.style.display === 'block' ? 'none' : 'block';
    }

    function saveNewItem() {
        const type = document.getElementById('fType').value;
        const newItem = {
            name: document.getElementById('fName').value,
            amt: parseFloat(document.getElementById('fAmt').value),
            src: document.getElementById('fSrc').value
        };

        if (newItem.name && newItem.amt) {
            if (type === 'income') myData.incomes.push(newItem);
            else myData.expenses.push(newItem);
            
            updateAndSave();
            toggleForm();
            // איפוס שדות
            document.getElementById('fName').value = '';
            document.getElementById('fAmt').value = '';
        }
    }

    function deleteItem(type, index) {
        if (confirm('למחוק את השורה הזו?')) {
            if (type === 'inc') myData.incomes.splice(index, 1);
            else myData.expenses.splice(index, 1);
            updateAndSave();
        }
    }

    function updateAndSave() {
        localStorage.setItem('budget_alexey', JSON.stringify(myData));
        render();
    }

    function render() {
        const tIn = myData.incomes.reduce((s, i) => s + i.amt, 0);
        const tOut = myData.expenses.reduce((s, e) => s + e.amt, 0);
        document.getElementById('netoDisplay').innerText = `₪${(tIn - tOut).toLocaleString()}`;

        document.getElementById('incList').innerHTML = myData.incomes.map((item, index) => `
            <div class="row">
                <div class="name">${item.name}</div>
                <div style="font-size:0.8rem; color:gray">${item.src}</div>
                <div class="amt" style="color:var(--primary)">₪${item.amt.toLocaleString()}</div>
                <div class="delete-btn" onclick="deleteItem('inc', ${index})"><i class="fas fa-trash"></i></div>
            </div>
        `).join('');

        document.getElementById('expList').innerHTML = myData.expenses.map((item, index) => `
            <div class="row">
                <div class="name">${item.name}</div>
                <div style="font-size:0.8rem; color:gray">${item.src}</div>
                <div class="amt" style="color:var(--danger)">₪${item.amt.toLocaleString()}</div>
                <div class="delete-btn" onclick="deleteItem('exp', ${index})"><i class="fas fa-trash"></i></div>
            </div>
        `).join('');
    }

    render();
</script>
</body>
</html>
